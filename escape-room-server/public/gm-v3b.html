<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[V3-B] 해킹 터미널 — 글로우 라인 + HUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
        :root {
            --bg-main:#0B1120; --bg-panel:#111827; --bg-panel-light:#1E293B;
            --neon-mint:#00FF9D; --neon-mint-dim:#10B981; --neon-cyan:#00E5FF;
            --crimson:#FF3366; --deep-blue:#0F4C81; --warn-yellow:#FFD166;
            --text-white:#FFFFFF; --text-muted:#64748B;
        }
        * { box-sizing:border-box; }
        body { font-family:'Share Tech Mono',monospace; background:var(--bg-main); color:var(--neon-mint); margin:0; overflow-x:hidden; }
        body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,157,0.012) 2px,rgba(0,255,157,0.012) 4px); pointer-events:none; z-index:9999; }

        /* 헤더 — HUD 스타일 */
        .header-bar { background:var(--bg-main); border-bottom:1px solid rgba(0,255,157,0.2); position:relative; }
        .header-bar::after { content:''; position:absolute; bottom:-1px; left:10%; right:10%; height:1px; background:linear-gradient(90deg,transparent,var(--neon-mint),transparent); }
        .timer-display { font-family:'Orbitron',sans-serif; font-size:3.5rem; color:var(--crimson); text-shadow:0 0 15px rgba(255,51,102,0.6),0 0 40px rgba(255,51,102,0.2); letter-spacing:0.1em; }
        .timer-display.warning { animation:timer-blink 1s infinite; }
        @keyframes timer-blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        .status-label { font-family:'Orbitron',sans-serif; font-size:0.6rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--neon-mint-dim); }
        .hdr-val { font-family:'Orbitron',sans-serif; font-weight:900; }

        .rec-dot { width:8px; height:8px; border-radius:50%; background:var(--neon-mint); animation:rec-blink 1.5s infinite; box-shadow:0 0 8px var(--neon-mint); }
        @keyframes rec-blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

        /* 알림 배너 — 스캔 라인 효과 */
        .alert-banner { background:linear-gradient(90deg,transparent,rgba(255,51,102,0.06),transparent); border-top:1px solid rgba(255,51,102,0.2); border-bottom:1px solid rgba(255,51,102,0.2); position:relative; overflow:hidden; }
        .alert-banner::before { content:''; position:absolute; top:0; left:-100%; width:50%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,51,102,0.08),transparent); animation:scan-line 4s linear infinite; }
        @keyframes scan-line { to { left:200%; } }

        .btn-action { background:var(--deep-blue); color:var(--neon-mint); border:1px solid var(--neon-mint-dim); padding:7px 14px; border-radius:3px; cursor:pointer; font-family:'Orbitron',sans-serif; font-size:0.65rem; letter-spacing:0.1em; transition:all 0.2s; }
        .btn-action:hover { box-shadow:0 0 12px rgba(0,255,157,0.2); border-color:var(--neon-mint); }
        .btn-danger { background:rgba(255,51,102,0.1); color:var(--crimson); border:1px solid rgba(255,51,102,0.4); padding:7px 14px; border-radius:3px; cursor:pointer; font-family:'Orbitron',sans-serif; font-size:0.65rem; letter-spacing:0.1em; transition:all 0.2s; }
        .btn-danger:hover { box-shadow:0 0 12px rgba(255,51,102,0.3); border-color:var(--crimson); }

        .log-panel { background:var(--bg-panel); border:1px solid rgba(0,255,157,0.1); font-size:0.68rem; max-height:280px; overflow-y:auto; border-radius:4px; }
        .log-panel::-webkit-scrollbar { width:3px; }
        .log-panel::-webkit-scrollbar-thumb { background:var(--neon-mint-dim); }
        .log-entry { padding:3px 8px; border-bottom:1px solid rgba(0,255,157,0.03); }

        /* 카드 — 글로우 라인 상단 */
        .team-card-wide {
            background:var(--bg-panel); border:1px solid rgba(0,255,157,0.1); border-radius:6px;
            transition:all 0.4s; position:relative; overflow:hidden;
            display:grid; grid-template-columns:180px 1fr 80px auto; align-items:center; gap:14px; padding:14px 20px;
        }
        .team-card-wide::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--neon-mint),var(--neon-cyan),transparent); }
        .team-card-wide:hover { border-color:rgba(0,255,157,0.3); box-shadow:0 4px 20px rgba(0,255,157,0.06); }
        .team-card-wide.cleared::before { background:linear-gradient(90deg,transparent,var(--neon-cyan),var(--neon-cyan),transparent); box-shadow:0 0 8px rgba(0,229,255,0.3); }
        .team-card-wide.cleared { border-color:rgba(0,229,255,0.3); }
        .team-card-wide.offline { opacity:0.25; }
        .team-card-wide.offline::before { background:linear-gradient(90deg,transparent,#334155,transparent); }

        .rank-badge { font-family:'Orbitron',sans-serif; font-size:0.55rem; letter-spacing:0.1em; padding:2px 8px; border-radius:3px; display:inline-block; margin-bottom:3px; }

        /* Pill 84px — 글로우 */
        .step-track { display:flex; align-items:center; gap:0; justify-content:center; }
        .mission-step {
            width:84px; height:38px; border-radius:19px;
            display:flex; align-items:center; justify-content:center;
            font-size:1.05rem; font-weight:900; transition:all 0.3s; flex-shrink:0;
            font-family:'Orbitron',sans-serif;
        }
        .step-done { background:var(--neon-mint); color:#0B1120; box-shadow:0 0 8px rgba(0,255,157,0.3); }
        .step-current { background:var(--crimson); color:#fff; animation:step-pulse 1.5s infinite; box-shadow:0 0 14px rgba(255,51,102,0.5); }
        .step-pending { background:var(--bg-panel-light); color:#475569; border:1px solid #334155; }
        @keyframes step-pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }

        .step-connector { height:2px; width:24px; flex-shrink:0; position:relative; }
        .step-connector.done { background:var(--neon-mint); box-shadow:0 0 4px rgba(0,255,157,0.3); }
        .step-connector.pending { background:#1E293B; }
        .step-connector .event-alert { position:absolute; top:-16px; left:50%; transform:translateX(-50%); font-size:20px; line-height:1; animation:event-blink 0.8s ease-in-out infinite; filter:drop-shadow(0 0 6px rgba(255,209,102,0.9)); }
        @keyframes event-blink { 0%,100%{opacity:1;transform:translateX(-50%) scale(1);} 50%{opacity:0.15;transform:translateX(-50%) scale(0.85);} }

        .progress-bar-wrapper { display:flex; align-items:center; gap:8px; }
        .progress-bg { flex:1; height:5px; background:var(--bg-panel-light); border-radius:3px; overflow:hidden; }
        .progress-fill { height:100%; border-radius:3px; transition:width 0.5s; }
        .pct-big { font-family:'Orbitron',sans-serif; font-size:1.5rem; font-weight:900; text-align:right; line-height:1; }

        /* 섹션 헤더 데코 */
        .section-line { height:1px; background:linear-gradient(90deg,rgba(0,255,157,0.3),transparent); flex:1; }
    </style>
</head>
<body>
    <header class="header-bar px-6 py-3 flex items-center justify-between relative z-10">
        <div class="flex items-center gap-4">
            <div class="rec-dot"></div>
            <div>
                <div class="status-label" style="color:var(--neon-mint-dim)">HACK_CONSOLE v2.1</div>
                <h1 class="text-lg font-bold text-white" style="font-family:'Orbitron',sans-serif; letter-spacing:0.15em;">GM TERMINAL</h1>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div class="text-center"><div class="status-label mb-1">NODES</div><div class="text-xl text-white hdr-val" id="hdr-nodes">0/8</div></div>
            <div class="text-center"><div class="status-label mb-1">AVG</div><div class="text-xl hdr-val" style="color:var(--neon-cyan)" id="hdr-avg">0%</div></div>
            <div class="text-center"><div class="status-label mb-1">REMAINING</div><div class="timer-display" id="main-timer">45:00</div></div>
            <div class="flex flex-col gap-2">
                <button class="btn-action" onclick="toggleTimer(true)">▶ START</button>
                <button class="btn-danger" onclick="toggleTimer(false)">⏸ PAUSE</button>
            </div>
        </div>
    </header>
    <div class="alert-banner mx-6 mt-3 p-3 text-center relative z-10">
        <span class="text-sm" style="font-family:'Orbitron',sans-serif; letter-spacing:0.12em; color:var(--warn-yellow);">⚠️ BREACH DETECTED — 갓찌(🐹) 침투 — 방화벽 복구 진행 중 ⚠️</span>
    </div>
    <main class="p-6 relative z-10">
        <div class="grid grid-cols-12 gap-4">
            <div class="col-span-8">
                <div class="flex items-center gap-3 mb-3"><div class="status-label">NODE_MONITOR</div><div class="section-line"></div><div class="text-[10px]" style="color:var(--text-muted)">진행도순</div></div>
                <div class="flex flex-col gap-3" id="team-list"></div>
                <div class="mt-4 p-4 rounded" style="background:var(--bg-panel);border:1px solid rgba(0,255,157,0.08);" id="ranking-panel"></div>
            </div>
            <div class="col-span-4 flex flex-col gap-4">
                <div><div class="flex items-center gap-3 mb-3"><div class="status-label">COMM_LOG</div><div class="section-line"></div></div><div class="log-panel p-2" id="log-panel"></div></div>
                <div><div class="flex items-center gap-3 mb-3"><div class="status-label">BROADCAST</div><div class="section-line"></div></div>
                    <div class="flex gap-2"><select id="msg-target" class="px-2 py-1 text-xs rounded" style="background:var(--bg-panel);border:1px solid rgba(0,255,157,0.15);color:var(--text-white)"><option value="ALL">ALL</option></select><input type="text" id="msg-input" class="flex-1 px-3 py-1 text-xs rounded focus:outline-none" style="background:var(--bg-panel);border:1px solid rgba(0,255,157,0.15);color:var(--text-white)" placeholder="메시지..."><button class="btn-action text-xs px-3" onclick="sendMsg()">TX</button></div>
                </div>
                <div><div class="flex items-center gap-3 mb-3"><div class="status-label">ACTIONS</div><div class="section-line"></div></div>
                    <div class="grid grid-cols-2 gap-2">
                        <button class="btn-action text-xs py-2">🔊 기준음</button>
                        <button class="btn-danger text-xs py-2">⚠️ 전체정지</button>
                        <button class="btn-action text-xs py-2" onclick="triggerEvent()">📢 이벤트</button>
                        <button class="btn-danger text-xs py-2">🏁 퇴실승인</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
    const teams=[{id:1,name:'갓찌토벌대',mission:2,progress:35,status:'active',cleared:false,clearTime:null,event:false},{id:2,name:'해바라기씨수호대',mission:6,progress:100,status:'active',cleared:true,clearTime:'32:15',event:false},{id:3,name:'럭키금성',mission:4,progress:72,status:'active',cleared:false,clearTime:null,event:true},{id:4,name:'LG워리어즈',mission:3,progress:50,status:'active',cleared:false,clearTime:null,event:false},{id:5,name:'대기 중',mission:0,progress:0,status:'offline',cleared:false,clearTime:null,event:false}];
    const logs=[{time:'18:00:00',type:'sys',text:'시스템 부팅 완료'},{time:'18:00:01',type:'sys',text:'⚠️ 갓찌🐹 침투 감지'},{time:'18:00:15',type:'node',text:'[T1] 접속'},{time:'18:00:18',type:'node',text:'[T2] 접속'},{time:'18:00:22',type:'node',text:'[T3] 접속'},{time:'18:01:00',type:'gm',text:'[GM→ALL] 시작'},{time:'18:04:35',type:'clear',text:'[T1] ✅ M1 클리어'},{time:'18:06:30',type:'fail',text:'[T1] ❌ M2 실패'},{time:'18:09:13',type:'clear',text:'[T2] ✅ M2 클리어'},{time:'18:10:00',type:'event',text:'[EVENT] ⚡ 바이러스!'},{time:'18:12:00',type:'gm',text:'[GM→T1] 힌트'},{time:'18:15:45',type:'clear',text:'[T3] ✅ M3 클리어'},{time:'18:20:00',type:'event',text:'[T3] ⚡ EVENT'}];
    function renderTeams(){
        const sorted=[...teams].sort((a,b)=>{if(a.cleared&&!b.cleared)return -1;if(!a.cleared&&b.cleared)return 1;return b.progress-a.progress;});
        const active=teams.filter(t=>t.status==='active');
        document.getElementById('hdr-nodes').innerText=`${active.length} / ${teams.length}`;
        document.getElementById('hdr-avg').innerText=`${active.length?Math.round(active.reduce((s,t)=>s+t.progress,0)/active.length):0}%`;
        document.getElementById('team-list').innerHTML=sorted.map((t,idx)=>{
            const off=t.status==='offline',clr=t.cleared,cls=clr?'cleared':(off?'offline':'');
            const mColor=clr?'var(--neon-cyan)':(off?'var(--text-muted)':'var(--crimson)');
            const mText=clr?'ALL CLEAR':(off?'STANDBY':`MISSION ${t.mission}`);
            let rank='';
            if(clr) rank=`<div class="rank-badge" style="background:rgba(0,229,255,0.08);color:var(--neon-cyan);border:1px solid rgba(0,229,255,0.25);">🏆 ${t.clearTime}</div>`;
            else if(!off) rank=`<div class="rank-badge" style="color:var(--text-muted);">#${idx+1}</div>`;
            const steps=buildSteps(t);
            const right=clr?`<div class="text-[10px] border rounded py-2 px-3 whitespace-nowrap" style="color:var(--neon-cyan);border-color:rgba(0,229,255,0.2)">🏆 ${t.clearTime}</div>`:(off?'<div></div>':`<button class="btn-danger text-[10px] py-2 px-3 whitespace-nowrap">🏁 퇴실</button>`);
            return `<div class="team-card-wide ${cls}"><div><div class="flex items-center gap-2 mb-1"><div class="w-2 h-2 rounded-full" style="${off?'background:#334155':'background:var(--neon-mint);box-shadow:0 0 5px var(--neon-mint);animation:rec-blink 1.5s infinite'}"></div><span class="font-bold text-sm" style="color:${off?'var(--text-muted)':'var(--text-white)'}">T${t.id} ${t.name}</span></div>${rank}<div class="text-xs mt-1" style="font-family:'Orbitron',sans-serif;color:${mColor};font-size:0.6rem">${mText}</div></div><div><div class="step-track mb-2">${steps}</div><div class="progress-bar-wrapper"><div class="progress-bg"><div class="progress-fill" style="width:${t.progress}%;background:var(--neon-cyan);box-shadow:0 0 5px rgba(0,229,255,0.3);"></div></div></div></div><div class="pct-big" style="color:${clr?'var(--neon-cyan)':'var(--neon-mint)'}">${t.progress}%</div>${right}</div>`;
        }).join('');
    }
    function buildSteps(team){let html='';for(let i=1;i<=5;i++){let cls='step-pending',lb=i;if(team.cleared||i<team.mission){cls='step-done';lb='✓';}else if(i===team.mission&&!team.cleared&&team.status!=='offline'){cls='step-current';}html+=`<div class="mission-step ${cls}">${lb}</div>`;if(i<5){const cc=(team.cleared||i<team.mission)?'done':'pending';const ev=team.event&&i===team.mission-1?`<span class="event-alert">⚠️</span>`:'';html+=`<div class="step-connector ${cc}">${ev}</div>`;}}return html;}
    function renderLogs(){const p=document.getElementById('log-panel');const cm={sys:'var(--warn-yellow)',node:'var(--neon-mint)',gm:'var(--neon-cyan)',clear:'var(--neon-mint)',fail:'var(--crimson)',event:'var(--warn-yellow)'};p.innerHTML=logs.map(l=>`<div class="log-entry" style="color:${cm[l.type]||'var(--text-white)'}">[${l.time}] ${l.text}</div>`).join('');p.scrollTop=p.scrollHeight;}
    function renderRanking(){const cl=teams.filter(t=>t.cleared).sort((a,b)=>{const f=s=>{const p=s.split(':');return+p[0]*60+ +p[1];};return f(a.clearTime)-f(b.clearTime);});const m=['🥇','🥈','🥉'];let h=`<div class="status-label mb-3">🏆 CLEAR RANKING</div><div class="flex gap-6 text-sm">`;for(let i=0;i<3;i++)h+=cl[i]?`<div class="flex items-center gap-2"><span class="text-lg">${m[i]}</span><span style="color:var(--text-white)">T${cl[i].id} ${cl[i].name}</span><span style="color:var(--text-muted)">${cl[i].clearTime}</span></div>`:`<div class="flex items-center gap-2" style="color:var(--text-muted)"><span class="text-lg">${m[i]}</span><span>---</span></div>`;document.getElementById('ranking-panel').innerHTML=h+'</div>';}
    function updateTargetSelect(){const s=document.getElementById('msg-target');s.innerHTML='<option value="ALL">ALL</option>';teams.filter(t=>t.status==='active').forEach(t=>{s.innerHTML+=`<option value="${t.id}">T${t.id} ${t.name}</option>`;});}
    function sendMsg(){const t=document.getElementById('msg-input').value.trim();if(!t)return;logs.push({time:new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),type:'gm',text:`[GM→${document.getElementById('msg-target').value}] ${t}`});document.getElementById('msg-input').value='';renderLogs();}
    function triggerEvent(){const t=teams.find(t=>t.id===1);t.event=!t.event;logs.push({time:new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),type:'event',text:`[T1] ⚡ EVENT ${t.event?'발동':'해제'}`});renderAll();}
    setInterval(()=>{const a=teams.filter(t=>t.status==='active'&&!t.cleared);if(!a.length)return;const t=a[Math.floor(Math.random()*a.length)];t.progress=Math.min(100,t.progress+Math.floor(Math.random()*5));if(t.progress>=100){t.cleared=true;const e=45*60-timerSeconds;t.clearTime=`${Math.floor(e/60).toString().padStart(2,'0')}:${(e%60).toString().padStart(2,'0')}`;t.event=false;logs.push({time:new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),type:'clear',text:`[T${t.id}] 🎉 ALL CLEAR!`});}if(!t.cleared)t.mission=Math.min(5,Math.floor(t.progress/20)+1);renderAll();},3000);
    let timerSeconds=45*60,timerRunning=false,timerInterval=null;
    function toggleTimer(s){timerRunning=s;if(s&&!timerInterval)timerInterval=setInterval(()=>{if(!timerRunning)return;timerSeconds--;if(timerSeconds<=0){timerSeconds=0;timerRunning=false;}const m=Math.floor(timerSeconds/60).toString().padStart(2,'0');const ss=(timerSeconds%60).toString().padStart(2,'0');document.getElementById('main-timer').innerText=`${m}:${ss}`;if(timerSeconds<5*60)document.getElementById('main-timer').classList.add('warning');},1000);}
    function renderAll(){renderTeams();renderLogs();renderRanking();updateTargetSelect();}
    renderAll();toggleTimer(true);
    </script>
</body>
</html>
