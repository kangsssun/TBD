<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[V3-C] 풀 HUD — 둥근 프로그레스 링 + 글리치</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
        :root {
            --bg-main:#0B1120; --bg-panel:#111827; --bg-panel-light:#1E293B;
            --neon-mint:#00FF9D; --neon-mint-dim:#10B981; --neon-cyan:#00E5FF;
            --crimson:#FF3366; --deep-blue:#0F4C81; --warn-yellow:#FFD166;
            --text-white:#FFFFFF; --text-muted:#64748B;
        }
        * { box-sizing:border-box; }
        body { font-family:'Share Tech Mono',monospace; background:var(--bg-main); color:var(--neon-mint); margin:0; overflow-x:hidden; }
        body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,157,0.01) 3px,rgba(0,255,157,0.01) 4px); pointer-events:none; z-index:9999; }

        /* 글리치 키프레임 */
        @keyframes glitch-1 { 0%,100%{clip-path:inset(0 0 90% 0);transform:translate(0)} 10%{clip-path:inset(40% 0 30% 0);transform:translate(-2px)} 20%{clip-path:inset(80% 0 5% 0);transform:translate(2px)} 30%,100%{clip-path:inset(0 0 100% 0);transform:translate(0)} }

        .header-bar { background:linear-gradient(180deg,#0d1528,var(--bg-main)); border-bottom:2px solid var(--neon-mint-dim); position:relative; }
        .header-bar::before { content:''; position:absolute; bottom:0; left:0; width:30%; height:2px; background:var(--neon-mint); box-shadow:0 0 10px var(--neon-mint); animation:header-scan 6s linear infinite; }
        @keyframes header-scan { 0%{left:-30%} 100%{left:100%} }

        .timer-display { font-family:'Orbitron',sans-serif; font-size:3.5rem; color:var(--crimson); text-shadow:0 0 15px rgba(255,51,102,0.6); letter-spacing:0.1em; position:relative; }
        .timer-display.warning { animation:timer-blink 1s infinite; }
        @keyframes timer-blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        .status-label { font-family:'Orbitron',sans-serif; font-size:0.55rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--neon-mint-dim); }
        .hdr-val { font-family:'Orbitron',sans-serif; font-weight:900; }

        .rec-dot { width:8px; height:8px; border-radius:50%; background:var(--crimson); animation:rec-blink 1s infinite; box-shadow:0 0 6px var(--crimson); }
        @keyframes rec-blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

        .alert-banner { background:rgba(255,209,102,0.04); border:1px solid rgba(255,209,102,0.15); }

        .btn-action { background:var(--deep-blue); color:var(--neon-mint); border:1px solid var(--neon-mint-dim); padding:7px 14px; border-radius:3px; cursor:pointer; font-family:'Orbitron',sans-serif; font-size:0.65rem; letter-spacing:0.1em; transition:all 0.15s; }
        .btn-action:hover { box-shadow:0 0 10px rgba(0,255,157,0.2); border-color:var(--neon-mint); }
        .btn-danger { background:rgba(255,51,102,0.1); color:var(--crimson); border:1px solid rgba(255,51,102,0.35); padding:7px 14px; border-radius:3px; cursor:pointer; font-family:'Orbitron',sans-serif; font-size:0.65rem; letter-spacing:0.1em; transition:all 0.15s; }
        .btn-danger:hover { box-shadow:0 0 10px rgba(255,51,102,0.25); }

        .log-panel { background:var(--bg-panel); border:1px solid rgba(0,255,157,0.08); font-size:0.68rem; max-height:280px; overflow-y:auto; border-radius:4px; }
        .log-panel::-webkit-scrollbar { width:3px; }
        .log-panel::-webkit-scrollbar-thumb { background:var(--neon-mint-dim); }
        .log-entry { padding:3px 8px; border-bottom:1px solid rgba(0,255,157,0.03); }

        /* 카드 — 2열 카드 + SVG 링 */
        .team-card {
            background:var(--bg-panel); border:1px solid rgba(0,255,157,0.1); border-radius:8px;
            transition:all 0.4s; position:relative; overflow:hidden; padding:16px;
            display:grid; grid-template-columns:70px 1fr; gap:12px; align-items:center;
        }
        .team-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(180deg,var(--neon-mint),var(--neon-cyan)); }
        .team-card:hover { border-color:rgba(0,255,157,0.25); box-shadow:0 0 20px rgba(0,255,157,0.06); }
        .team-card.cleared { border-color:rgba(0,229,255,0.3); }
        .team-card.cleared::before { background:var(--neon-cyan); }
        .team-card.offline { opacity:0.2; }

        /* SVG 링 */
        .ring-wrap { position:relative; width:64px; height:64px; }
        .ring-wrap svg { transform:rotate(-90deg); }
        .ring-bg { fill:none; stroke:var(--bg-panel-light); stroke-width:5; }
        .ring-fill { fill:none; stroke-width:5; stroke-linecap:round; transition:stroke-dashoffset 0.6s; }
        .ring-pct { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Orbitron',sans-serif; font-size:0.85rem; font-weight:900; }

        /* Pill 84px */
        .step-track { display:flex; align-items:center; gap:0; margin-top:8px; }
        .mission-step {
            width:84px; height:34px; border-radius:17px;
            display:flex; align-items:center; justify-content:center;
            font-size:0.95rem; font-weight:900; transition:all 0.3s; flex-shrink:0;
            font-family:'Orbitron',sans-serif;
        }
        .step-done { background:var(--neon-mint); color:#0B1120; }
        .step-current { background:var(--crimson); color:#fff; animation:step-pulse 1.5s infinite; box-shadow:0 0 12px rgba(255,51,102,0.4); }
        .step-pending { background:var(--bg-panel-light); color:#475569; border:1px solid #334155; }
        @keyframes step-pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }

        .step-connector { height:2px; width:16px; flex-shrink:0; position:relative; }
        .step-connector.done { background:var(--neon-mint); }
        .step-connector.pending { background:#1E293B; }
        .step-connector .event-alert { position:absolute; top:-14px; left:50%; transform:translateX(-50%); font-size:18px; line-height:1; animation:event-blink 0.8s ease-in-out infinite; filter:drop-shadow(0 0 5px rgba(255,209,102,0.9)); }
        @keyframes event-blink { 0%,100%{opacity:1;transform:translateX(-50%) scale(1);} 50%{opacity:0.15;transform:translateX(-50%) scale(0.85);} }

        .section-line { height:1px; background:linear-gradient(90deg,rgba(0,255,157,0.25),transparent); flex:1; }
    </style>
</head>
<body>
    <header class="header-bar px-6 py-3 flex items-center justify-between relative z-10">
        <div class="flex items-center gap-4">
            <div class="rec-dot"></div>
            <div>
                <div class="status-label">ESCAPE_TERMINAL</div>
                <h1 class="text-lg font-bold text-white" style="font-family:'Orbitron',sans-serif; letter-spacing:0.12em;">GM HUD CONSOLE</h1>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div class="text-center"><div class="status-label mb-1">NODES</div><div class="text-xl text-white hdr-val" id="hdr-nodes">0/8</div></div>
            <div class="text-center"><div class="status-label mb-1">AVG</div><div class="text-xl hdr-val" style="color:var(--neon-cyan)" id="hdr-avg">0%</div></div>
            <div class="text-center"><div class="status-label mb-1">REMAINING</div><div class="timer-display" id="main-timer">45:00</div></div>
            <div class="flex flex-col gap-2">
                <button class="btn-action" onclick="toggleTimer(true)">▶ START</button>
                <button class="btn-danger" onclick="toggleTimer(false)">⏸ PAUSE</button>
            </div>
        </div>
    </header>
    <div class="alert-banner mx-6 mt-3 p-3 rounded text-center relative z-10">
        <span class="text-sm" style="font-family:'Orbitron',sans-serif; letter-spacing:0.1em; color:var(--warn-yellow);">⚠️ BREACH — 갓찌(🐹) 해킹 감지 — 5단계 복구 ⚠️</span>
    </div>
    <main class="p-6 relative z-10">
        <div class="grid grid-cols-12 gap-4">
            <div class="col-span-8">
                <div class="flex items-center gap-3 mb-3"><div class="status-label">NODE_MONITOR</div><div class="section-line"></div></div>
                <div class="grid grid-cols-2 gap-3" id="team-grid"></div>
                <div class="mt-4 p-4 rounded" style="background:var(--bg-panel);border:1px solid rgba(0,255,157,0.08);" id="ranking-panel"></div>
            </div>
            <div class="col-span-4 flex flex-col gap-4">
                <div><div class="flex items-center gap-3 mb-3"><div class="status-label">COMM_LOG</div><div class="section-line"></div></div><div class="log-panel p-2" id="log-panel"></div></div>
                <div><div class="flex items-center gap-3 mb-3"><div class="status-label">BROADCAST</div><div class="section-line"></div></div>
                    <div class="flex gap-2"><select id="msg-target" class="px-2 py-1 text-xs rounded" style="background:var(--bg-panel);border:1px solid rgba(0,255,157,0.12);color:var(--text-white)"><option value="ALL">ALL</option></select><input type="text" id="msg-input" class="flex-1 px-3 py-1 text-xs rounded focus:outline-none" style="background:var(--bg-panel);border:1px solid rgba(0,255,157,0.12);color:var(--text-white)" placeholder="메시지..."><button class="btn-action text-xs px-3" onclick="sendMsg()">TX</button></div>
                </div>
                <div><div class="flex items-center gap-3 mb-3"><div class="status-label">ACTIONS</div><div class="section-line"></div></div>
                    <div class="grid grid-cols-2 gap-2">
                        <button class="btn-action text-xs py-2">🔊 기준음</button>
                        <button class="btn-danger text-xs py-2">⚠️ 전체정지</button>
                        <button class="btn-action text-xs py-2" onclick="triggerEvent()">📢 이벤트</button>
                        <button class="btn-danger text-xs py-2">🏁 퇴실승인</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
    const teams=[{id:1,name:'갓찌토벌대',mission:2,progress:35,status:'active',cleared:false,clearTime:null,event:false},{id:2,name:'해바라기씨수호대',mission:6,progress:100,status:'active',cleared:true,clearTime:'32:15',event:false},{id:3,name:'럭키금성',mission:4,progress:72,status:'active',cleared:false,clearTime:null,event:true},{id:4,name:'LG워리어즈',mission:3,progress:50,status:'active',cleared:false,clearTime:null,event:false},{id:5,name:'대기 중',mission:0,progress:0,status:'offline',cleared:false,clearTime:null,event:false}];
    const logs=[{time:'18:00:00',type:'sys',text:'터미널 부팅'},{time:'18:00:01',type:'sys',text:'⚠️ 갓찌🐹 침투'},{time:'18:00:15',type:'node',text:'[T1] ON'},{time:'18:00:18',type:'node',text:'[T2] ON'},{time:'18:00:22',type:'node',text:'[T3] ON'},{time:'18:01:00',type:'gm',text:'[GM→ALL] 시작'},{time:'18:04:35',type:'clear',text:'[T1] ✅ M1'},{time:'18:06:30',type:'fail',text:'[T1] ❌ M2 실패'},{time:'18:09:13',type:'clear',text:'[T2] ✅ M2'},{time:'18:10:00',type:'event',text:'[EVT] ⚡ 바이러스'},{time:'18:12:00',type:'gm',text:'[GM→T1] 힌트'},{time:'18:15:45',type:'clear',text:'[T3] ✅ M3'},{time:'18:20:00',type:'event',text:'[T3] ⚡ EVT'}];

    const R=27, C=2*Math.PI*R;
    function renderTeams(){
        const sorted=[...teams].sort((a,b)=>{if(a.cleared&&!b.cleared)return -1;if(!a.cleared&&b.cleared)return 1;return b.progress-a.progress;});
        const active=teams.filter(t=>t.status==='active');
        document.getElementById('hdr-nodes').innerText=`${active.length} / ${teams.length}`;
        document.getElementById('hdr-avg').innerText=`${active.length?Math.round(active.reduce((s,t)=>s+t.progress,0)/active.length):0}%`;
        document.getElementById('team-grid').innerHTML=sorted.map((t,idx)=>{
            const off=t.status==='offline',clr=t.cleared,cls=clr?'cleared':(off?'offline':'');
            const strokeColor=clr?'var(--neon-cyan)':'var(--neon-mint)';
            const pctColor=clr?'var(--neon-cyan)':(off?'var(--text-muted)':'var(--neon-mint)');
            const mColor=clr?'var(--neon-cyan)':(off?'var(--text-muted)':'var(--crimson)');
            const mText=clr?'CLEAR':(off?'STANDBY':`M${t.mission}`);
            const offset=C-(t.progress/100)*C;
            const steps=buildSteps(t);
            let badge='';
            if(clr) badge=`<span class="text-[10px]" style="color:var(--neon-cyan)">🏆 ${t.clearTime}</span>`;
            else if(!off) badge=`<span class="text-[10px]" style="color:var(--text-muted)">#${idx+1}</span>`;
            return `<div class="team-card ${cls}">
                <div class="ring-wrap">
                    <svg width="64" height="64" viewBox="0 0 64 64"><circle class="ring-bg" cx="32" cy="32" r="${R}"/><circle class="ring-fill" cx="32" cy="32" r="${R}" stroke="${strokeColor}" stroke-dasharray="${C}" stroke-dashoffset="${offset}" style="${clr?'filter:drop-shadow(0 0 4px rgba(0,229,255,0.4))':''}"/></svg>
                    <div class="ring-pct" style="color:${pctColor}">${t.progress}%</div>
                </div>
                <div>
                    <div class="flex items-center gap-2 mb-1">
                        <div class="w-2 h-2 rounded-full" style="${off?'background:#334155':'background:var(--neon-mint);box-shadow:0 0 4px var(--neon-mint);animation:rec-blink 1.5s infinite'}"></div>
                        <span class="font-bold text-sm" style="color:${off?'var(--text-muted)':'var(--text-white)'}">T${t.id} ${t.name}</span>
                        ${badge}
                    </div>
                    <div class="text-xs" style="font-family:'Orbitron',sans-serif;color:${mColor};font-size:0.55rem">${mText}</div>
                    <div class="step-track">${steps}</div>
                </div>
            </div>`;
        }).join('');
    }
    function buildSteps(team){let html='';for(let i=1;i<=5;i++){let cls='step-pending',lb=i;if(team.cleared||i<team.mission){cls='step-done';lb='✓';}else if(i===team.mission&&!team.cleared&&team.status!=='offline'){cls='step-current';}html+=`<div class="mission-step ${cls}">${lb}</div>`;if(i<5){const cc=(team.cleared||i<team.mission)?'done':'pending';const ev=team.event&&i===team.mission-1?`<span class="event-alert">⚠️</span>`:'';html+=`<div class="step-connector ${cc}">${ev}</div>`;}}return html;}
    function renderLogs(){const p=document.getElementById('log-panel');const cm={sys:'var(--warn-yellow)',node:'var(--neon-mint)',gm:'var(--neon-cyan)',clear:'var(--neon-mint)',fail:'var(--crimson)',event:'var(--warn-yellow)'};p.innerHTML=logs.map(l=>`<div class="log-entry" style="color:${cm[l.type]||'var(--text-white)'}">[${l.time}] ${l.text}</div>`).join('');p.scrollTop=p.scrollHeight;}
    function renderRanking(){const cl=teams.filter(t=>t.cleared).sort((a,b)=>{const f=s=>{const p=s.split(':');return+p[0]*60+ +p[1];};return f(a.clearTime)-f(b.clearTime);});const m=['🥇','🥈','🥉'];let h=`<div class="status-label mb-3">🏆 RANKING</div><div class="flex gap-6 text-sm">`;for(let i=0;i<3;i++)h+=cl[i]?`<div class="flex items-center gap-2"><span class="text-lg">${m[i]}</span><span style="color:var(--text-white)">T${cl[i].id} ${cl[i].name}</span><span style="color:var(--text-muted)">${cl[i].clearTime}</span></div>`:`<div class="flex items-center gap-2" style="color:var(--text-muted)"><span class="text-lg">${m[i]}</span><span>---</span></div>`;document.getElementById('ranking-panel').innerHTML=h+'</div>';}
    function updateTargetSelect(){const s=document.getElementById('msg-target');s.innerHTML='<option value="ALL">ALL</option>';teams.filter(t=>t.status==='active').forEach(t=>{s.innerHTML+=`<option value="${t.id}">T${t.id} ${t.name}</option>`;});}
    function sendMsg(){const t=document.getElementById('msg-input').value.trim();if(!t)return;logs.push({time:new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),type:'gm',text:`[GM→${document.getElementById('msg-target').value}] ${t}`});document.getElementById('msg-input').value='';renderLogs();}
    function triggerEvent(){const t=teams.find(t=>t.id===1);t.event=!t.event;logs.push({time:new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),type:'event',text:`[T1] ⚡ EVENT ${t.event?'발동':'해제'}`});renderAll();}
    setInterval(()=>{const a=teams.filter(t=>t.status==='active'&&!t.cleared);if(!a.length)return;const t=a[Math.floor(Math.random()*a.length)];t.progress=Math.min(100,t.progress+Math.floor(Math.random()*5));if(t.progress>=100){t.cleared=true;const e=45*60-timerSeconds;t.clearTime=`${Math.floor(e/60).toString().padStart(2,'0')}:${(e%60).toString().padStart(2,'0')}`;t.event=false;logs.push({time:new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),type:'clear',text:`[T${t.id}] 🎉 CLEAR!`});}if(!t.cleared)t.mission=Math.min(5,Math.floor(t.progress/20)+1);renderAll();},3000);
    let timerSeconds=45*60,timerRunning=false,timerInterval=null;
    function toggleTimer(s){timerRunning=s;if(s&&!timerInterval)timerInterval=setInterval(()=>{if(!timerRunning)return;timerSeconds--;if(timerSeconds<=0){timerSeconds=0;timerRunning=false;}const m=Math.floor(timerSeconds/60).toString().padStart(2,'0');const ss=(timerSeconds%60).toString().padStart(2,'0');document.getElementById('main-timer').innerText=`${m}:${ss}`;if(timerSeconds<5*60)document.getElementById('main-timer').classList.add('warning');},1000);}
    function renderAll(){renderTeams();renderLogs();renderRanking();updateTargetSelect();}
    renderAll();toggleTimer(true);
    </script>
</body>
</html>
