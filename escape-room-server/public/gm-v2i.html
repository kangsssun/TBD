<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[V2-I] 밀리터리 작전본부 — GM 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
        * { box-sizing: border-box; }
        body { font-family: 'Share Tech Mono', monospace; background: #0c0f0a; color: #b8c4a0; margin: 0; overflow-x: hidden; }

        /* 토포그래피 맵 배경 */
        .topo-bg { position:fixed; inset:0; pointer-events:none; z-index:0; opacity:0.15;
            background-image: radial-gradient(ellipse at 30% 50%, rgba(100,180,60,0.15) 0%, transparent 60%),
                              radial-gradient(ellipse at 70% 30%, rgba(100,180,60,0.1) 0%, transparent 50%);
        }
        body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(100,180,60,0.02) 3px,rgba(100,180,60,0.02) 4px); pointer-events:none; z-index:9999; }

        .header-bar { background:linear-gradient(180deg,#141a0f 0%,#0c0f0a 100%); border-bottom:2px solid #4a6b20; box-shadow:0 2px 20px rgba(74,107,32,0.3); }
        .timer-display { font-family:'Orbitron',sans-serif; font-size:4rem; color:#ff4444; text-shadow:0 0 20px rgba(255,68,68,0.6); letter-spacing:0.1em; }
        .timer-display.warning { animation:timer-blink 1s infinite; }
        @keyframes timer-blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        .status-label { font-family:'Orbitron',sans-serif; font-size:0.6rem; letter-spacing:0.3em; text-transform:uppercase; color:#6b8f3a; }
        .rec-dot { width:10px; height:10px; border-radius:50%; background:#6b8f3a; animation:rec-blink 1.5s infinite; box-shadow:0 0 8px rgba(107,143,58,0.5); }
        @keyframes rec-blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

        .alert-banner { background:rgba(74,107,32,0.08); border:1px solid rgba(74,107,32,0.4); border-left:4px solid #ff4444; }

        .btn-mil { background:#2a3a18; color:#a0c060; border:1px solid #4a6b20; padding:8px 16px; border-radius:2px; cursor:pointer; font-family:'Orbitron',sans-serif; font-size:0.7rem; letter-spacing:0.1em; transition:all 0.2s; text-transform:uppercase; }
        .btn-mil:hover { background:#3a4a28; box-shadow:0 0 10px rgba(74,107,32,0.3); }
        .btn-mil.danger { background:#3a1818; color:#ff6644; border-color:#662222; }
        .btn-mil.danger:hover { background:#4a2020; }

        .log-panel { background:rgba(12,15,10,0.9); border:1px solid #2a3a18; font-size:0.7rem; max-height:300px; overflow-y:auto; }
        .log-panel::-webkit-scrollbar { width:4px; }
        .log-panel::-webkit-scrollbar-thumb { background:#4a6b20; border-radius:2px; }
        .log-entry { padding:3px 8px; border-bottom:1px solid #1a2212; }

        /* 카드 — 밀리터리 스타일 */
        .team-card-wide {
            background: #111a0e; border: 1px solid #2a3a18; border-radius: 2px;
            transition: all 0.5s; position: relative; overflow: hidden;
            display: grid; grid-template-columns: 180px 1fr 80px auto; align-items: center; gap: 14px; padding: 16px 20px;
        }
        .team-card-wide::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:linear-gradient(180deg,#6b8f3a,#4a6b20); }
        .team-card-wide:hover { border-color:#6b8f3a; box-shadow:0 0 15px rgba(74,107,32,0.15); }
        .team-card-wide.cleared { border-color:#00cc44; }
        .team-card-wide.cleared::before { background:#00cc44; box-shadow:0 0 10px rgba(0,204,68,0.3); }
        .team-card-wide.offline { opacity:0.3; }
        .team-card-wide.offline::before { background:#333; }

        /* 콜사인 태그 */
        .callsign { font-family:'Orbitron',sans-serif; font-size:0.55rem; letter-spacing:0.15em; padding:2px 8px; border-radius:2px; display:inline-block; margin-bottom:4px; background:#2a3a18; color:#6b8f3a; border:1px solid #4a6b20; }
        .callsign.cleared { background:rgba(0,204,68,0.1); color:#00cc44; border-color:#00cc44; }

        /* ===== Pill 84px — 밀리터리 각진 스타일 ===== */
        .step-track { display:flex; align-items:center; gap:0; justify-content:center; }
        .mission-step {
            width: 84px; height: 38px; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.05rem; font-weight: 900; transition: all 0.3s; flex-shrink: 0;
            font-family: 'Orbitron', sans-serif;
        }
        .step-done { background: #4a6b20; color: #e0f0c0; border:1px solid #6b8f3a; }
        .step-current { background: #cc3300; color: #fff; animation: step-pulse 1.5s infinite; box-shadow: 0 0 14px rgba(204,51,0,0.5); border:1px solid #ff4400; }
        .step-pending { background: #1a2212; color: #3a4a28; border: 1px solid #2a3a18; }
        @keyframes step-pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.04);} }

        .step-connector { height:3px; width:24px; flex-shrink:0; position:relative; }
        .step-connector.done { background:#4a6b20; }
        .step-connector.pending { background:#1a2212; }
        .step-connector .event-alert { position:absolute; top:-16px; left:50%; transform:translateX(-50%); font-size:20px; line-height:1; animation:event-blink 0.8s ease-in-out infinite; filter:drop-shadow(0 0 6px rgba(255,100,0,0.9)); }
        @keyframes event-blink { 0%,100%{opacity:1;transform:translateX(-50%) scale(1);} 50%{opacity:0.15;transform:translateX(-50%) scale(0.85);} }

        .progress-bar-wrapper { display:flex; align-items:center; gap:8px; }
        .progress-bg { flex:1; height:6px; background:#1a2212; border-radius:1px; overflow:hidden; border:1px solid #2a3a18; }
        .progress-fill { height:100%; transition:width 0.5s; }
        .pct-big { font-family:'Orbitron',sans-serif; font-size:1.6rem; font-weight:900; text-align:right; line-height:1; }

        /* 레이더 스캔 효과 (헤더 장식) */
        .radar-container { width:60px; height:60px; position:relative; }
        .radar-circle { width:100%; height:100%; border-radius:50%; border:1px solid #4a6b20; position:absolute; }
        .radar-circle.inner { width:60%; height:60%; top:20%; left:20%; }
        .radar-sweep { width:50%; height:2px; background:linear-gradient(90deg, transparent, #6b8f3a); position:absolute; top:50%; left:50%; transform-origin:left center; animation:radar-spin 3s linear infinite; }
        @keyframes radar-spin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
        .radar-dot { width:4px; height:4px; border-radius:50%; background:#00cc44; position:absolute; animation:radar-dot-blink 2s infinite; }
        @keyframes radar-dot-blink { 0%,70%{opacity:0;} 75%{opacity:1;} 100%{opacity:0;} }
    </style>
</head>
<body>
    <div class="topo-bg"></div>
    <header class="header-bar px-6 py-3 flex items-center justify-between relative z-10">
        <div class="flex items-center gap-4">
            <div class="radar-container">
                <div class="radar-circle"></div>
                <div class="radar-circle inner"></div>
                <div class="radar-sweep"></div>
                <div class="radar-dot" style="top:25%;left:60%"></div>
                <div class="radar-dot" style="top:65%;left:35%;animation-delay:0.8s"></div>
                <div class="radar-dot" style="top:40%;left:70%;animation-delay:1.5s"></div>
            </div>
            <div>
                <div class="status-label">COMMAND CENTER</div>
                <h1 class="text-xl font-bold" style="font-family:'Orbitron',sans-serif; letter-spacing:0.15em; color:#a0c060;">OPS CONTROL</h1>
            </div>
        </div>
        <div class="flex items-center gap-8">
            <div class="text-center"><div class="status-label mb-1">UNITS</div><div class="text-2xl font-bold" style="font-family:'Orbitron',sans-serif; color:#a0c060;" id="hdr-nodes">0 / 8</div></div>
            <div class="text-center"><div class="status-label mb-1">MISSION AVG</div><div class="text-2xl font-bold" style="font-family:'Orbitron',sans-serif; color:#ffaa00;" id="hdr-avg">0%</div></div>
            <div class="text-center"><div class="status-label mb-1">COUNTDOWN</div><div class="timer-display" id="main-timer">45:00</div></div>
            <div class="flex flex-col gap-2">
                <button class="btn-mil" onclick="toggleTimer(true)">▶ ENGAGE</button>
                <button class="btn-mil danger" onclick="toggleTimer(false)">⏸ HOLD</button>
            </div>
        </div>
    </header>
    <div class="alert-banner mx-6 mt-4 p-3 text-center relative z-10">
        <span class="text-sm" style="font-family:'Orbitron',sans-serif; letter-spacing:0.1em; color:#ff6644;">⚠️ HOSTILE CONTACT — 갓찌(🐹) 침투 감지 — 5단계 작전 수행 중 ⚠️</span>
    </div>
    <main class="p-6 relative z-10">
        <div class="grid grid-cols-12 gap-4">
            <div class="col-span-8">
                <div class="flex items-center gap-2 mb-3"><div class="status-label">FIELD UNIT STATUS</div><div class="flex-1 h-px" style="background:#2a3a18;"></div><div class="text-[10px]" style="color:#4a6b20;">진행도 순</div></div>
                <div class="flex flex-col gap-3" id="team-list"></div>
                <div class="mt-4 p-4" style="background:#111a0e; border:1px solid #2a3a18;" id="ranking-panel"></div>
            </div>
            <div class="col-span-4 flex flex-col gap-4">
                <div><div class="flex items-center gap-2 mb-3"><div class="status-label">COMMS LOG</div><div class="flex-1 h-px" style="background:#2a3a18;"></div></div><div class="log-panel rounded p-2" id="log-panel"></div></div>
                <div><div class="flex items-center gap-2 mb-3"><div class="status-label">BROADCAST</div><div class="flex-1 h-px" style="background:#2a3a18;"></div></div>
                    <div class="flex gap-2"><select id="msg-target" class="bg-black border text-gray-300 px-2 py-1 rounded text-xs" style="border-color:#2a3a18"><option value="ALL">ALL</option></select><input type="text" id="msg-input" class="flex-1 bg-black border text-white px-3 py-1 rounded text-xs focus:outline-none" style="border-color:#2a3a18" placeholder="명령..."><button class="btn-mil text-xs px-3" onclick="sendMsg()">SEND</button></div>
                </div>
                <div><div class="flex items-center gap-2 mb-3"><div class="status-label">TACTICAL</div><div class="flex-1 h-px" style="background:#2a3a18;"></div></div>
                    <div class="grid grid-cols-2 gap-2"><button class="btn-mil text-xs py-2">🔊 신호음</button><button class="btn-mil danger text-xs py-2">⚠️ 작전중지</button><button class="btn-mil text-xs py-2" onclick="triggerEvent()">📢 이벤트</button><button class="btn-mil text-xs py-2" style="background:#2a2a18;color:#ccaa44;border-color:#4a4a20">🏁 철수승인</button></div>
                </div>
            </div>
        </div>
    </main>
    <script>
    const callsigns=['ALPHA','BRAVO','CHARLIE','DELTA','ECHO'];
    const teams=[{id:1,name:'갓찌토벌대',mission:2,progress:35,status:'active',cleared:false,clearTime:null,event:false},{id:2,name:'해바라기씨수호대',mission:6,progress:100,status:'active',cleared:true,clearTime:'32:15',event:false},{id:3,name:'럭키금성',mission:4,progress:72,status:'active',cleared:false,clearTime:null,event:true},{id:4,name:'LG워리어즈',mission:3,progress:50,status:'active',cleared:false,clearTime:null,event:false},{id:5,name:'대기 중',mission:0,progress:0,status:'offline',cleared:false,clearTime:null,event:false}];
    const logs=[{time:'18:00:00',type:'sys',text:'작전본부 시스템 가동'},{time:'18:00:01',type:'sys',text:'⚠️ 적 감지 — 갓찌🐹'},{time:'18:00:15',type:'node',text:'[ALPHA] 배치 완료'},{time:'18:00:18',type:'node',text:'[BRAVO] 배치 완료'},{time:'18:00:22',type:'node',text:'[CHARLIE] 배치 완료'},{time:'18:01:00',type:'gm',text:'[CMD→ALL] 작전 개시'},{time:'18:04:35',type:'clear',text:'[ALPHA] ✅ OBJ-1 확보'},{time:'18:06:30',type:'fail',text:'[ALPHA] ❌ OBJ-2 실패'},{time:'18:09:13',type:'clear',text:'[BRAVO] ✅ OBJ-2 확보'},{time:'18:10:00',type:'event',text:'[ALERT] ⚡ 적 증원!'},{time:'18:12:00',type:'gm',text:'[CMD→ALPHA] 지원 전송'},{time:'18:15:45',type:'clear',text:'[CHARLIE] ✅ OBJ-3 확보'},{time:'18:20:00',type:'event',text:'[CHARLIE] ⚡ 조우전'}];

    function renderTeams(){
        const sorted=[...teams].sort((a,b)=>{if(a.cleared&&!b.cleared)return -1;if(!a.cleared&&b.cleared)return 1;return b.progress-a.progress;});
        const active=teams.filter(t=>t.status==='active');
        document.getElementById('hdr-nodes').innerText=`${active.length} / ${teams.length}`;
        document.getElementById('hdr-avg').innerText=`${active.length?Math.round(active.reduce((s,t)=>s+t.progress,0)/active.length):0}%`;
        document.getElementById('team-list').innerHTML=sorted.map((t,idx)=>{
            const off=t.status==='offline',clr=t.cleared;
            const cls=clr?'cleared':(off?'offline':'');
            const mColor=clr?'#00cc44':(off?'#333':'#ff4444');
            const mText=clr?'MISSION COMPLETE':(off?'STANDBY':`OBJECTIVE ${t.mission}`);
            const cs=callsigns[t.id-1]||'UNIT';
            let rank='';
            if(clr) rank=`<div class="callsign cleared">🏆 ${cs} — ${t.clearTime}</div>`;
            else if(!off) rank=`<div class="callsign">${cs} — #${idx+1}</div>`;
            else rank=`<div class="callsign" style="opacity:0.4">${cs}</div>`;
            const steps=buildSteps(t);
            const pGrad=clr?'#00cc44':(t.progress>60?'linear-gradient(90deg,#6b8f3a,#8fbb44)':'linear-gradient(90deg,#cc3300,#ff4400)');
            const right=clr?`<div class="text-center text-[10px] border rounded py-2 px-3 whitespace-nowrap" style="color:#00cc44;border-color:#00cc44;">🏆 ${t.clearTime}</div>`:(off?'<div></div>':`<button class="btn-mil text-[10px] py-2 px-3 whitespace-nowrap">🏁 철수</button>`);
            return `<div class="team-card-wide ${cls}"><div><div class="flex items-center gap-2 mb-1"><div class="w-2.5 h-2.5 rounded-full ${off?'bg-gray-700':''}" style="${off?'':'background:#6b8f3a;box-shadow:0 0 6px rgba(107,143,58,0.5);'}"></div><span class="${off?'text-gray-600':'text-white'} font-bold text-sm">T${t.id} ${t.name}</span></div>${rank}<div class="text-xs mt-1" style="font-family:'Orbitron',sans-serif;color:${mColor};">${mText}</div></div><div><div class="step-track mb-2">${steps}</div><div class="progress-bar-wrapper"><div class="progress-bg"><div class="progress-fill" style="width:${t.progress}%;background:${pGrad};"></div></div></div></div><div class="pct-big" style="color:${mColor}">${t.progress}%</div>${right}</div>`;
        }).join('');
    }
    function buildSteps(team){let html='';for(let i=1;i<=5;i++){let cls='step-pending',lb=i;if(team.cleared||i<team.mission){cls='step-done';lb='✓';}else if(i===team.mission&&!team.cleared&&team.status!=='offline'){cls='step-current';}html+=`<div class="mission-step ${cls}">${lb}</div>`;if(i<5){const cc=(team.cleared||i<team.mission)?'done':'pending';const ev=team.event&&i===team.mission-1?`<span class="event-alert">⚠️</span>`:'';html+=`<div class="step-connector ${cc}">${ev}</div>`;}}return html;}
    function renderLogs(){const p=document.getElementById('log-panel');const cm={sys:'text-yellow-500',node:'text-green-400',gm:'text-blue-400',clear:'text-cyan-400',fail:'text-red-400',event:'text-orange-400'};p.innerHTML=logs.map(l=>`<div class="log-entry ${cm[l.type]||''}">[${l.time}] ${l.text}</div>`).join('');p.scrollTop=p.scrollHeight;}
    function renderRanking(){const cl=teams.filter(t=>t.cleared).sort((a,b)=>{const f=s=>{const p=s.split(':');return+p[0]*60+ +p[1];};return f(a.clearTime)-f(b.clearTime);});const m=['🥇','🥈','🥉'];let h=`<div class="status-label mb-3">🏆 OPERATION RANKING</div><div class="flex gap-6 text-sm">`;for(let i=0;i<3;i++)h+=cl[i]?`<div class="flex items-center gap-2"><span class="text-lg">${m[i]}</span><span class="text-white">T${cl[i].id} ${cl[i].name}</span><span class="text-gray-500">${cl[i].clearTime}</span></div>`:`<div class="flex items-center gap-2 text-gray-600"><span class="text-lg">${m[i]}</span><span>---</span></div>`;document.getElementById('ranking-panel').innerHTML=h+'</div>';}
    function updateTargetSelect(){const s=document.getElementById('msg-target');s.innerHTML='<option value="ALL">ALL</option>';teams.filter(t=>t.status==='active').forEach(t=>{s.innerHTML+=`<option value="${t.id}">T${t.id} ${t.name}</option>`;});}
    function sendMsg(){const t=document.getElementById('msg-input').value.trim();if(!t)return;logs.push({time:new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),type:'gm',text:`[CMD→${document.getElementById('msg-target').value}] ${t}`});document.getElementById('msg-input').value='';renderLogs();}
    function triggerEvent(){const t=teams.find(t=>t.id===1);t.event=!t.event;logs.push({time:new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),type:'event',text:`[ALPHA] ⚡ EVENT ${t.event?'발동':'해제'}`});renderAll();}
    setInterval(()=>{const a=teams.filter(t=>t.status==='active'&&!t.cleared);if(!a.length)return;const t=a[Math.floor(Math.random()*a.length)];t.progress=Math.min(100,t.progress+Math.floor(Math.random()*5));if(t.progress>=100){t.cleared=true;const e=45*60-timerSeconds;t.clearTime=`${Math.floor(e/60).toString().padStart(2,'0')}:${(e%60).toString().padStart(2,'0')}`;t.event=false;logs.push({time:new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),type:'clear',text:`[T${t.id}] 🎉 MISSION COMPLETE!`});}if(!t.cleared)t.mission=Math.min(5,Math.floor(t.progress/20)+1);renderAll();},3000);
    let timerSeconds=45*60,timerRunning=false,timerInterval=null;
    function toggleTimer(s){timerRunning=s;if(s&&!timerInterval)timerInterval=setInterval(()=>{if(!timerRunning)return;timerSeconds--;if(timerSeconds<=0){timerSeconds=0;timerRunning=false;}const m=Math.floor(timerSeconds/60).toString().padStart(2,'0');const ss=(timerSeconds%60).toString().padStart(2,'0');document.getElementById('main-timer').innerText=`${m}:${ss}`;if(timerSeconds<5*60)document.getElementById('main-timer').classList.add('warning');},1000);}
    function renderAll(){renderTeams();renderLogs();renderRanking();updateTargetSelect();}
    renderAll();toggleTimer(true);
    </script>
</body>
</html>
