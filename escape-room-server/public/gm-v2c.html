<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[V2-C] Pill + 이중정보행 + EVENT 커넥터 라인 강조</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
        * { box-sizing: border-box; }
        body { font-family: 'Share Tech Mono', 'Courier New', monospace; background: #0a0a0a; color: #00ff41; margin: 0; overflow-x: hidden; }
        body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,0.03) 2px,rgba(0,255,65,0.03) 4px); pointer-events:none; z-index:9999; }
        .header-bar { background:linear-gradient(180deg,#1a0000 0%,#0a0a0a 100%); border-bottom:2px solid #ff0000; box-shadow:0 2px 20px rgba(255,0,0,0.3); }
        .timer-display { font-family:'Orbitron',sans-serif; font-size:4rem; color:#ff0000; text-shadow:0 0 20px rgba(255,0,0,0.8),0 0 40px rgba(255,0,0,0.4); letter-spacing:0.1em; }
        .timer-display.warning { animation:timer-blink 1s infinite; }
        @keyframes timer-blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        .status-label { font-family:'Orbitron',sans-serif; font-size:0.65rem; letter-spacing:0.3em; text-transform:uppercase; }
        .rec-dot { width:10px; height:10px; border-radius:50%; background:#ff0000; animation:rec-blink 1.5s infinite; }
        @keyframes rec-blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
        .alert-banner { background:linear-gradient(90deg,#1a0000,#330000,#1a0000); border:1px solid #ff0000; animation:alert-glow 2s infinite; }
        @keyframes alert-glow { 0%,100%{box-shadow:0 0 10px rgba(255,0,0,0.3);} 50%{box-shadow:0 0 25px rgba(255,0,0,0.6);} }
        .grid-overlay { position:fixed; inset:0; pointer-events:none; z-index:1; background-image:linear-gradient(rgba(255,0,0,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,0,0,0.03) 1px,transparent 1px); background-size:50px 50px; }
        .btn-danger { background:#cc0000; color:white; border:none; padding:8px 16px; border-radius:4px; cursor:pointer; font-family:'Orbitron',sans-serif; font-size:0.7rem; letter-spacing:0.1em; transition:all 0.2s; }
        .btn-danger:hover { background:#ff0000; box-shadow:0 0 15px rgba(255,0,0,0.5); }
        .btn-primary { background:#0066cc; color:white; border:none; padding:8px 16px; border-radius:4px; cursor:pointer; font-family:'Share Tech Mono',monospace; font-size:0.8rem; transition:all 0.2s; }
        .btn-primary:hover { background:#0088ff; }
        .log-panel { background:#0a0a0a; border:1px solid #333; font-size:0.7rem; max-height:300px; overflow-y:auto; }
        .log-panel::-webkit-scrollbar { width:4px; }
        .log-panel::-webkit-scrollbar-thumb { background:#ff0000; border-radius:2px; }
        .log-entry { padding:3px 8px; border-bottom:1px solid #1a1a1a; }

        /* 카드: 2행 레이아웃 (상단: 팀정보+퍼센트, 하단: 풀와이드 스텝바) */
        .team-card-v2c {
            background: #111; border: 1px solid #333; border-radius: 8px;
            transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
            position: relative; overflow: hidden; padding: 0;
        }
        .team-card-v2c::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:linear-gradient(180deg,#ff0000,#ff6600); }
        .team-card-v2c:hover { border-color:#ff0000; box-shadow:0 0 15px rgba(255,0,0,0.15); }
        .team-card-v2c.cleared::before { background:#00ff41; }
        .team-card-v2c.cleared { border-color:rgba(0,255,65,0.4); }
        .team-card-v2c.offline { opacity:0.35; }
        .team-card-v2c.offline::before { background:#333; }

        .card-top { display:flex; align-items:center; justify-content:space-between; padding:12px 16px 8px 20px; }
        .card-bottom { padding:0 16px 10px 20px; }

        /* Pill 스텝: 풀와이드, 높이 작게, 라벨 내장 */
        .step-track-full { display:flex; align-items:center; gap:0; width:100%; }
        .mission-step-pill {
            flex:1; height:22px; border-radius:4px;
            display:flex; align-items:center; justify-content:center;
            font-size:0.55rem; font-weight:700; transition:all 0.3s;
            letter-spacing:0.08em;
        }
        .pill-done { background:#00ff41; color:#000; }
        .pill-current { background:#ff0000; color:#fff; box-shadow:0 0 8px rgba(255,0,0,0.5); animation:pill-glow 1.5s infinite; }
        .pill-pending { background:rgba(255,255,255,0.03); color:#333; border:1px solid #1e1e1e; }
        @keyframes pill-glow { 0%,100%{box-shadow:0 0 8px rgba(255,0,0,0.5);} 50%{box-shadow:0 0 16px rgba(255,0,0,0.8);} }

        /* 커넥터: 가는 선 + event alert */
        .pill-conn {
            width:6px; height:22px; flex-shrink:0; position:relative;
            display:flex; align-items:center; justify-content:center;
        }
        .pill-conn-line { width:100%; height:2px; }
        .pill-conn-line.done { background:#00994d; }
        .pill-conn-line.pending { background:#1a1a1a; }

        .pill-conn .event-alert {
            position:absolute; top:-11px; left:50%; transform:translateX(-50%);
            font-size:10px; line-height:1;
            animation:event-blink 0.7s ease-in-out infinite;
            filter:drop-shadow(0 0 6px rgba(255,200,0,0.9));
        }
        /* event 커넥터 자체도 노란색으로 */
        .pill-conn.has-event .pill-conn-line { background:#f59e0b !important; animation:conn-blink 0.7s ease-in-out infinite; }
        @keyframes event-blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
        @keyframes conn-blink { 0%,100%{background:#f59e0b;} 50%{background:#7c5a00;} }

        .pct-big { font-family:'Orbitron',sans-serif; font-size:1.6rem; font-weight:900; }
        .rank-chip { font-family:'Orbitron',sans-serif; font-size:0.55rem; padding:2px 6px; border-radius:3px; }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <header class="header-bar px-6 py-3 flex items-center justify-between relative z-10">
        <div class="flex items-center gap-4">
            <div class="rec-dot"></div>
            <div>
                <div class="status-label text-red-500">SECURITY SYSTEM v2.1</div>
                <h1 class="text-xl font-bold text-white" style="font-family:'Orbitron',sans-serif; letter-spacing:0.15em;">GM MASTER CONTROL</h1>
            </div>
        </div>
        <div class="flex items-center gap-8">
            <div class="text-center"><div class="status-label text-gray-500 mb-1">NODES</div><div class="text-2xl text-white font-bold" style="font-family:'Orbitron',sans-serif;" id="hdr-nodes">0/8</div></div>
            <div class="text-center"><div class="status-label text-gray-500 mb-1">AVG</div><div class="text-2xl text-yellow-400 font-bold" style="font-family:'Orbitron',sans-serif;" id="hdr-avg">0%</div></div>
            <div class="text-center"><div class="status-label text-gray-500 mb-1">REMAINING</div><div class="timer-display" id="main-timer">45:00</div></div>
            <div class="flex flex-col gap-2">
                <button class="btn-danger" onclick="toggleTimer(true)">▶ START</button>
                <button class="btn-danger" style="background:#666" onclick="toggleTimer(false)">⏸ PAUSE</button>
            </div>
        </div>
    </header>
    <div class="alert-banner mx-6 mt-4 p-3 rounded text-center relative z-10">
        <span class="text-red-400 text-sm" style="font-family:'Orbitron',sans-serif; letter-spacing:0.15em;">⚠️ SYSTEM BREACH — 갓찌(🐹) 보안 장애 — 5단계 인증 복구 진행 중 ⚠️</span>
    </div>

    <main class="p-6 relative z-10">
        <div class="grid grid-cols-12 gap-4">
            <div class="col-span-8">
                <div class="flex items-center gap-2 mb-3"><div class="status-label text-gray-400">NODE STATUS MONITORING</div><div class="flex-1 h-px bg-gray-800"></div><div class="text-[10px] text-gray-600">진행도 순</div></div>
                <div class="flex flex-col gap-2" id="team-list"></div>
                <div class="mt-4 p-4 rounded" style="background:#0d0d0d; border:1px solid #222;" id="ranking-panel"></div>
            </div>
            <div class="col-span-4 flex flex-col gap-4">
                <div>
                    <div class="flex items-center gap-2 mb-3"><div class="status-label text-gray-400">COMMUNICATION LOG</div><div class="flex-1 h-px bg-gray-800"></div></div>
                    <div class="log-panel rounded p-2" id="log-panel"></div>
                </div>
                <div>
                    <div class="flex items-center gap-2 mb-3"><div class="status-label text-gray-400">GM BROADCAST</div><div class="flex-1 h-px bg-gray-800"></div></div>
                    <div class="flex gap-2">
                        <select id="msg-target" class="bg-black border border-gray-700 text-gray-300 px-2 py-1 rounded text-xs"><option>ALL</option></select>
                        <input type="text" id="msg-input" class="flex-1 bg-black border border-gray-700 text-white px-3 py-1 rounded text-xs focus:outline-none focus:border-red-500" placeholder="메시지...">
                        <button class="btn-primary text-xs px-3" onclick="sendMsg()">SEND</button>
                    </div>
                </div>
                <div>
                    <div class="flex items-center gap-2 mb-3"><div class="status-label text-gray-400">QUICK ACTIONS</div><div class="flex-1 h-px bg-gray-800"></div></div>
                    <div class="grid grid-cols-2 gap-2">
                        <button class="btn-primary text-xs py-2">🔊 기준음</button>
                        <button class="btn-danger text-xs py-2">⚠️ 전체정지</button>
                        <button class="btn-primary text-xs py-2" onclick="triggerEvent()">📢 이벤트</button>
                        <button class="btn-primary text-xs py-2" style="background:#7c3aed">🏁 퇴실승인</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
    const teams = [
        { id:1, name:'갓찌토벌대', mission:2, progress:35, status:'active', cleared:false, clearTime:null, event:false },
        { id:2, name:'해바라기씨수호대', mission:6, progress:100, status:'active', cleared:true, clearTime:'32:15', event:false },
        { id:3, name:'럭키금성', mission:4, progress:72, status:'active', cleared:false, clearTime:null, event:true },
        { id:4, name:'LG워리어즈', mission:3, progress:50, status:'active', cleared:false, clearTime:null, event:false },
        { id:5, name:'대기 중', mission:0, progress:0, status:'offline', cleared:false, clearTime:null, event:false },
    ];
    const logs = [
        {time:'18:00:00',type:'sys',text:'보안 시스템 초기화'},{time:'18:00:01',type:'sys',text:'⚠️ 비콘 장애 — 갓찌🐹'},
        {time:'18:00:15',type:'node',text:'[T1] 연결'},{time:'18:00:18',type:'node',text:'[T2] 연결'},
        {time:'18:01:00',type:'gm',text:'[GM→ALL] 게임 시작'},{time:'18:04:35',type:'clear',text:'[T1] ✅ M1 클리어'},
        {time:'18:09:13',type:'clear',text:'[T2] ✅ M2 클리어'},{time:'18:10:00',type:'event',text:'[EVENT] ⚡ 바이러스!'},
        {time:'18:20:00',type:'event',text:'[T3] ⚡ EVENT 진입'},
    ];

    function renderTeams() {
        const sorted = [...teams].sort((a,b) => {
            if (a.cleared && !b.cleared) return -1;
            if (!a.cleared && b.cleared) return 1;
            return b.progress - a.progress;
        });
        const active = teams.filter(t=>t.status==='active');
        document.getElementById('hdr-nodes').innerText = `${active.length}/${teams.length}`;
        document.getElementById('hdr-avg').innerText = `${active.length ? Math.round(active.reduce((s,t)=>s+t.progress,0)/active.length) : 0}%`;

        document.getElementById('team-list').innerHTML = sorted.map((t,idx) => {
            const off = t.status==='offline';
            const cls = t.cleared?'cleared':(off?'offline':'');
            const pColor = t.cleared?'#00ff41':(t.progress>60?'#22d3ee':'#ff6600');
            const mText = t.cleared?'ALL CLEAR':(off?'OFFLINE':`MISSION ${t.mission}`);
            const rankLabel = t.cleared?`<span class="rank-chip" style="background:rgba(0,255,65,0.15);color:#00ff41;border:1px solid #00994d;">🏆 ${t.clearTime}</span>`:(off?'':`<span class="rank-chip" style="background:rgba(255,255,255,0.05);color:#666;">#${idx+1}</span>`);

            // 스텝
            let steps = '';
            for (let i=1; i<=5; i++) {
                let sc='pill-pending', lb=`M${i}`;
                if (t.cleared||i<t.mission) { sc='pill-done'; lb='✓'; }
                else if (i===t.mission&&!t.cleared&&!off) { sc='pill-current'; lb=`M${i}`; }
                steps += `<div class="mission-step-pill ${sc}">${lb}</div>`;
                if (i<5) {
                    const cc = (t.cleared||i<t.mission)?'done':'pending';
                    const isEvent = t.event && (i===t.mission-1 || i===t.mission);
                    const evClass = isEvent ? 'has-event' : '';
                    const evIcon = isEvent && i===t.mission-1 ? `<span class="event-alert">⚠️</span>` : '';
                    steps += `<div class="pill-conn ${evClass}">${evIcon}<div class="pill-conn-line ${cc}"></div></div>`;
                }
            }

            return `<div class="team-card-v2c ${cls}">
                <div class="card-top">
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full ${off?'bg-gray-700':'bg-green-500 animate-pulse'}"></div>
                        <span class="${off?'text-gray-600':'text-white'} font-bold text-sm">T${t.id} ${t.name}</span>
                        ${rankLabel}
                        <span class="text-[10px]" style="font-family:'Orbitron',sans-serif;color:${pColor}">${mText}</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="pct-big" style="color:${pColor}">${t.progress}%</span>
                        ${t.cleared?'<span class="text-[10px] text-green-400 border border-green-800 rounded px-2 py-1">퇴실완료</span>':(off?'':'<button class="text-[10px] py-1 px-2 border border-gray-700 rounded text-gray-400 hover:text-white hover:border-red-500 transition">🏁퇴실</button>')}
                    </div>
                </div>
                <div class="card-bottom">
                    <div class="step-track-full">${steps}</div>
                </div>
            </div>`;
        }).join('');
    }

    function renderLogs() {
        const cm={sys:'text-yellow-500',node:'text-green-400',gm:'text-blue-400',clear:'text-cyan-400',fail:'text-red-400',event:'text-yellow-400'};
        const p=document.getElementById('log-panel');
        p.innerHTML=logs.map(l=>`<div class="log-entry ${cm[l.type]||''}">[${l.time}] ${l.text}</div>`).join('');
        p.scrollTop=p.scrollHeight;
    }

    function renderRanking() {
        const cl=teams.filter(t=>t.cleared).sort((a,b)=>{const f=s=>{const p=s.split(':');return+p[0]*60+ +p[1];};return f(a.clearTime)-f(b.clearTime);});
        const m=['🥇','🥈','🥉'];
        let h=`<div class="status-label text-gray-400 mb-3">🏆 CLEAR RANKING</div><div class="flex gap-6 text-sm">`;
        for(let i=0;i<3;i++) h+=cl[i]?`<div class="flex items-center gap-2"><span class="text-yellow-400 text-lg">${m[i]}</span><span class="text-white">T${cl[i].id} ${cl[i].name}</span><span class="text-gray-500">${cl[i].clearTime}</span></div>`:`<div class="flex items-center gap-2 text-gray-600"><span class="text-lg">${m[i]}</span><span>---</span></div>`;
        document.getElementById('ranking-panel').innerHTML=h+'</div>';
    }

    function sendMsg(){const t=document.getElementById('msg-input').value.trim();if(!t)return;logs.push({time:new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),type:'gm',text:`[GM→${document.getElementById('msg-target').value}] ${t}`});document.getElementById('msg-input').value='';renderAll();}
    function triggerEvent(){const t=teams.find(t=>t.id===1);t.event=!t.event;logs.push({time:new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),type:'event',text:`[T1] ⚡ EVENT ${t.event?'발동':'해제'}`});renderAll();}

    setInterval(()=>{const a=teams.filter(t=>t.status==='active'&&!t.cleared);if(!a.length)return;const t=a[Math.floor(Math.random()*a.length)];t.progress=Math.min(100,t.progress+Math.floor(Math.random()*5));if(t.progress>=100){t.cleared=true;const e=45*60-timerSeconds;t.clearTime=`${Math.floor(e/60).toString().padStart(2,'0')}:${(e%60).toString().padStart(2,'0')}`;t.event=false;logs.push({time:new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),type:'clear',text:`[T${t.id}] 🎉 ALL CLEAR!`});}if(!t.cleared)t.mission=Math.min(5,Math.floor(t.progress/20)+1);renderAll();},3000);

    let timerSeconds=45*60,timerRunning=false,timerInterval=null;
    function toggleTimer(s){timerRunning=s;if(s&&!timerInterval)timerInterval=setInterval(()=>{if(!timerRunning)return;timerSeconds--;if(timerSeconds<=0){timerSeconds=0;timerRunning=false;}const m=Math.floor(timerSeconds/60).toString().padStart(2,'0');const ss=(timerSeconds%60).toString().padStart(2,'0');document.getElementById('main-timer').innerText=`${m}:${ss}`;if(timerSeconds<5*60)document.getElementById('main-timer').classList.add('warning');},1000);}

    function renderAll(){renderTeams();renderLogs();renderRanking();}
    renderAll();toggleTimer(true);
    </script>
</body>
</html>
