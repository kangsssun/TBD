<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room Node Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #0f172a; color: #10b981; margin: 0; padding: 0; }
        .cyber-panel { border: 1px solid #10b981; background-color: rgba(16, 185, 129, 0.05); }
        .log-box { max-height: 200px; overflow-y: auto; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 3px; }
        .modal-bg { background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px); }
        
        /* 가속도 센서 수평계 UI (단일 노드용 크기 복원) */
        .level-container { width: 200px; height: 200px; border-radius: 50%; border: 3px solid #10b981; position: relative; background: #1e293b; margin: 0 auto; overflow: hidden; }
        .level-target { width: 60px; height: 60px; border-radius: 50%; border: 2px dashed #f59e0b; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .level-bubble { width: 30px; height: 30px; border-radius: 50%; background: #ef4444; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); transition: background 0.1s; pointer-events: none;}
        
        /* 배경 이미지 오버레이 스타일 (NFS 등 임베디드 컨셉) */
        .bg-image-overlay { position: absolute; inset: 0; opacity: 0.15; background-image: url('image_0.png'); background-size: cover; background-position: center; pointer-events: none; }
    </style>
</head>
<body class="p-6 min-h-screen flex items-center justify-center overflow-auto relative" onload="initNodeSimulation()">

    <div class="bg-image-overlay"></div>

    <section id="single-node-terminal" class="cyber-panel p-6 rounded-lg shadow-[0_0_20px_rgba(16,185,129,0.4)] w-full max-w-4xl relative z-10 hidden">
        <div class="border-b border-green-800 pb-4 mb-5 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <h1 class="text-2xl font-bold tracking-widest text-white">TEAM 1 TERMINAL</h1>
                <span id="node-timer" class="text-4xl font-bold text-red-500 bg-gray-900 px-3 py-1 rounded border border-red-900">45:00</span>
            </div>
            <div class="flex gap-3">
                <button onclick="openModal('notice-modal')" class="relative border border-yellow-600 text-yellow-500 px-4 py-2 rounded hover:bg-yellow-900 transition flex items-center gap-2">
                    📢 SYSTEM NOTICES
                    <span id="notice-badge" class="hidden absolute -top-2 -right-2 bg-red-600 text-white rounded-full w-4 h-4 flex items-center justify-center text-[10px] animate-pulse">N</span>
                </button>
                <button onclick="openModal('msg-modal')" class="relative border border-blue-600 text-blue-400 px-4 py-2 rounded hover:bg-blue-900 transition flex items-center gap-2">
                    💬 CONTACT GM
                    <span id="msg-badge" class="hidden absolute -top-2 -right-2 bg-red-600 text-white rounded-full w-4 h-4 flex items-center justify-center text-[10px] animate-pulse">N</span>
                </button>
            </div>
        </div>
        
        <div class="mb-5">
            <div class="flex items-center text-sm mb-1">
                <span class="w-32 text-green-400">MISSION PROGRESS</span>
                <div class="flex-1 bg-gray-700 h-2 rounded-full mx-3"><div id="node-prog-bar" class="bg-green-500 h-2 rounded-full transition-all w-0"></div></div>
                <span id="node-prog-pct" class="w-12 text-right text-green-400 font-bold">0%</span>
            </div>
            <div class="flex items-center text-sm mb-1 mt-2">
                <span class="w-32 text-blue-400">GLOBAL AVERAGE</span>
                <div class="flex-1 bg-gray-700 h-2 rounded-full mx-3"><div id="global-prog-bar" class="bg-blue-500 h-2 rounded-full transition-all" style="width: 45%;"></div></div>
                <span id="global-prog-pct" class="w-12 text-right text-blue-400 font-bold">45%</span>
            </div>
        </div>

        <div id="mission-area" class="flex-1 flex flex-col items-center justify-center bg-black border border-green-900 p-6 text-center rounded-lg relative overflow-hidden min-h-[400px]">
            </div>
    </section>

    <div id="notice-modal" class="hidden fixed inset-0 modal-bg flex items-center justify-center z-50">
        <div class="bg-gray-900 border border-yellow-600 p-6 rounded-lg w-full max-w-2xl shadow-[0_0_25px_rgba(202,138,4,0.4)]">
            <div class="flex justify-between items-center border-b border-yellow-800 pb-3 mb-4">
                <h2 class="text-xl text-yellow-500 font-bold tracking-widest">📢 SYSTEM NOTICES</h2>
                <button onclick="closeModal('notice-modal')" class="text-gray-400 hover:text-white text-3xl font-bold">&times;</button>
            </div>
            <div id="notice-list" class="space-y-3 h-64 overflow-y-auto pr-2 text-sm">
                </div>
        </div>
    </div>

    <div id="msg-modal" class="hidden fixed inset-0 modal-bg flex items-center justify-center z-50">
        <div class="bg-gray-900 border border-blue-600 p-6 rounded-lg w-full max-w-2xl shadow-[0_0_25px_rgba(37,99,235,0.4)]">
            <div class="flex justify-between items-center border-b border-blue-800 pb-3 mb-4">
                <h2 class="text-xl text-blue-400 font-bold tracking-widest">💬 DIRECT MESSAGE</h2>
                <button onclick="closeModal('msg-modal')" class="text-gray-400 hover:text-white text-3xl font-bold">&times;</button>
            </div>
            <div id="direct-msg-list" class="space-y-3 h-80 overflow-y-auto bg-black p-4 border border-gray-700 rounded-lg mb-4 text-sm">
                </div>
            <div class="flex gap-2">
                <input type="text" id="node-msg-input" class="flex-1 bg-gray-800 border border-blue-700 p-3 text-blue-300 rounded-lg focus:outline-none text-sm" placeholder="GM에게 보낼 메시지 입력 (힌트 요청 등)...">
                <button onclick="sendNodeMessage()" class="bg-blue-700 text-white px-6 py-3 rounded-lg hover:bg-blue-600 transition font-bold">SEND</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 상태 및 데이터 정의 (단일 노드용으로 단순화) ---
        let timeRemaining = 45 * 60; // 초 단위 타이머
        let mainTimerInterval = null;
        let currentMissionStage = 1; // 현재 진행 중인 미션 번호
        
        // 공지 및 메시지 상태
        let noticeBadgeActive = false; 
        let msgBadgeActive = false; 
        let globalNotices = [{ time: getTimestamp(), text: "긴급 공지: 시스템 비콘 장애로 퇴실 권한이 잠금 처리되었습니다. 보안 시스템 인증을 완료하십시오." }];
        let nodeMsgs = []; // GM과 주고받은 메시지 내역

        // 미션 정보 (제공해주신 데이터 그대로 유지)
        const missionStages = {
            1: { title: "MISSION 1: 퇴근 신호를 수신하라", desc: "누군가 이미 퇴실한 선배가 몰래 보내는 힌트가 있다. LED 신호를 해독해야 다음 문이 열린다.", ui: `<div class="text-4xl text-yellow-400 tracking-[0.7em] mb-6 animate-pulse">●---- ----● ●●●●- --●●●</div><div class="text-sm text-gray-500 mb-4">모스부호 해독 힌트: 1(●----), 9(----●), 4(●●●●-), 7(--●●●)</div>`, inputType: "text", answer: "1947", progress: 0 },
            2: { title: "MISSION 2: 보안 멜로디를 연주하라", desc: "시스템이 멜로디를 재생한다. 각 음계에 대응하는 알파벳을 순서대로 입력해야 한다.", ui: `<button onclick="alert('부저 멜로디 재생: 삐- 삐- 삐- 삐- 삐- (파-시-레-미-도)')" class="bg-gray-700 text-white px-6 py-3 rounded mb-6 hover:bg-gray-600">🔊 멜로디 듣기</button><div class="text-sm text-gray-500 mb-4">대응표: 도=B, 레=C, 미=K, 파=L, 솔=O, 라=R, 시=U, 높은도=Y</div>`, inputType: "text", answer: "LUCKY", progress: 20 },
            3: { title: "MISSION 3: 숨겨진 인증 코드를 스캔하라", desc: "퇴근 인증 QR코드가 사무실 어딘가에 숨겨져 있다. 찾아서 스캔해야 다음 단계가 열린다.", ui: `<div class="w-48 h-48 border-2 border-dashed border-green-500 flex items-center justify-center mb-6 text-gray-500 bg-gray-900 text-sm">카메라 프리뷰 영역</div>`, inputType: "button", btnText: "QR 스캔 완료", progress: 40 },
            4: { title: "MISSION 4: 서버를 정상화하라", desc: "서버가 온도 이상으로 셧다운됐다. 정확히 정상 온도 범위를 3초간 유지해야 냉각 시스템이 재가동된다.", ui: `<div class="mb-4"><span class="text-2xl" id="current-temp">26.3</span>°C <br><span class="text-sm text-gray-400">목표: 25.0°C ~ 25.5°C 3초 유지</span></div><div class="flex gap-2 justify-center mb-4"><button onclick="adjustTemp(-0.5)" class="bg-blue-600 px-4 py-2 rounded">-0.5°C (차갑게)</button><button onclick="adjustTemp(0.5)" class="bg-red-600 px-4 py-2 rounded">+0.5°C (뜨겁게)</button></div><div class="w-1/2 bg-gray-700 rounded-full h-2 mt-4 mx-auto"><div id="temp-progress" class="bg-green-500 h-2 rounded-full transition-all" style="width:0%"></div></div>`, inputType: "temp", progress: 60 },
            5: { title: "MISSION 5: 최종 잠금을 해제하라", desc: "퇴근 코드 금고는 특수 물리 잠금장치로 보호되어 있다. 단말기를 정확한 각도로 5초간 기울여야만 열린다.", inputType: "sensor", maxCount: 1, progress: 80 },
            6: { title: "EVENT 1: 바이러스 제거", desc: "외부 바이러스가 보안 시스템 커널에 침투했습니다.\n바이러스 모듈명 'virus.ko'를 제거하는 올바른 명령어를 선택하십시오.\nA) insmod virus.ko  B) rmmod virus  C) modprobe virus  D) depmod virus", inputType: "text", answer: "B", progress: 40 },
            7: { title: "EVENT 2: 커널 패닉 원인 파악", desc: "부팅 중 커널 패닉 발생. 직접적인 원인은?\nVFS: Cannot open root device\nKernel panic - not syncing: VFS: Unable to mount root fs\n\nA) 커널 버전 호환성  B) Root File System 마운트 실패  C) U-Boot 환경변수 오류  D) ext4 포맷 불일치", inputType: "text", answer: "B", progress: 60 },
            8: { title: "EVENT 3-1: 부트 순서 정렬", desc: "해커가 부트 순서 정보를 뒤섞어 놨습니다. 올바른 순서를 정렬하십시오.\n1. init/systemd\n2. 커널 로드 및 압축 해제\n3. BIOS/UEFI POST\n4. 부트로더 (U-Boot/GRUB)\n5. 루트 파일시스템 마운트\n정답 순서 입력 (예: 1-2-3-4-5)", inputType: "text", answer: "3-4-2-5-1", progress: 80 },
            10: { title: "EVENT 3-2: 시스템 콜 차단 해제", desc: "해커가 파일 열기 시스템 콜을 차단했습니다. 파일을 열 때 호출되는 시스템 콜은?\n\nA) read()  B) fork()  C) open()  D) exec()", inputType: "text", answer: "C", progress: 80 },
            9: { title: "SYSTEM SECURED", desc: "모든 미션 및 이벤트 완료. 퇴실 권한이 복구되었습니다.", ui: `<div class="text-6xl text-green-400 font-bold my-8 animate-pulse">CLEAR</div>`, inputType: "none", progress: 100 }
        };

        // 가속도 센서 게임용 상태
        let currentSensorSuccessCount = 0;
        let currentHoldProgress = 0;
        let sensorHoldInterval = null;
        let tempValue = 26.3;
        let tempInterval = null;
        let tempHoldTime = 0;
        
        let event1Timer = null;
        let event2Timer = null;

        // --- 2. 초기화 및 UI 렌더링 ---
        function initNodeSimulation() {
            renderMissionContent();
            updateProgressUI();
            startTimer();
            document.getElementById('single-node-terminal').classList.remove('hidden');
        }

        function getTimestamp() { return new Date().toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' }); }

        function updateProgressUI() {
            const m = missionStages[currentMissionStage];
            document.getElementById('node-prog-bar').style.width = `${m.progress}%`;
            document.getElementById('node-prog-pct').innerText = `${m.progress}%`;
        }

        function renderMissionContent() {
            const m = missionStages[currentMissionStage];
            const container = document.getElementById('mission-area');
            const isEvent = [6, 7, 8, 10].includes(currentMissionStage);
            
            // 컨테이너 스타일 (이벤트 시 붉은색 경고 테마)
            if (isEvent) {
                container.className = "flex-1 flex flex-col items-center justify-center bg-red-950 border-4 border-red-600 p-6 text-center rounded-lg relative overflow-hidden min-h-[400px] shadow-[inset_0_0_50px_rgba(220,38,38,0.5)]";
            } else {
                container.className = "flex-1 flex flex-col items-center justify-center bg-black border border-green-900 p-6 text-center rounded-lg relative overflow-hidden min-h-[400px]";
            }
            
            // 공통 헤더 및 설명
            let html = '';
            const descFormatted = m.desc.replace(/\n/g, '<br>');
            
            if (isEvent) {
                html += `<div class="text-4xl font-black text-red-500 mb-4 tracking-widest animate-pulse flex items-center gap-3">
                            <span>⚠️</span> ${m.title} <span>⚠️</span>
                         </div>
                         <div class="bg-red-900 bg-opacity-50 border border-red-500 p-4 rounded mb-8">
                             <p class="text-red-200 text-center max-w-lg font-bold text-lg">${descFormatted}</p>
                         </div>`;
            } else {
                html += `<h2 class="text-2xl text-white mb-2 font-bold">${m.title}</h2>
                         <p class="text-gray-400 mb-10 text-center max-w-lg">${descFormatted}</p>`;
            }
            
            // 입력 유형에 따른 동적 UI 렌더링
            if(m.inputType === "sensor") {
                html += `
                    <div class="level-container" id="sensor-pad" onmousemove="handleSensor(event)" onmouseleave="resetSensor()">
                        <div class="level-target"></div><div class="level-bubble" id="bubble"></div>
                    </div>
                    <div class="w-1/2 bg-gray-700 rounded-full h-2 mt-4 mx-auto"><div id="hold-progress" class="bg-blue-500 h-2 rounded-full transition-all" style="width:0%"></div></div>
                `;
            }
            else if(m.inputType === "temp") {
                html += m.ui;
                startTempCheck();
            }
            else if(m.inputType === "text") {
                if(m.ui) html += m.ui;
                const inputClass = isEvent ? "flex-1 bg-red-900 border border-red-400 p-3 text-red-100 text-center rounded focus:outline-none text-sm placeholder-red-300" : "flex-1 bg-gray-800 border border-green-700 p-3 text-white text-center rounded focus:outline-none text-sm";
                const btnClass = isEvent ? "bg-red-600 text-white px-6 py-3 rounded hover:bg-red-500 font-bold text-sm shadow-[0_0_10px_rgba(220,38,38,0.8)]" : "bg-green-700 text-white px-6 py-3 rounded hover:bg-green-600 font-bold text-sm";
                html += `<div class="mt-4 flex gap-2 w-2/3 max-w-sm"><input type="text" id="answer-input" class="${inputClass}" placeholder="${m.answer} 입력"><button onclick="submitAnswer()" class="${btnClass}">입력</button></div>`;
            } 
            else if (m.inputType === "button") {
                if(m.ui) html += m.ui;
                html += `<button onclick="advanceMission()" class="bg-green-700 text-white px-10 py-4 rounded text-lg font-bold hover:bg-green-600 transition">${m.btnText}</button>`;
            } 
            else if (m.inputType === "none") {
                if(m.ui) html += m.ui;
            }

            container.innerHTML = html;
        }

        function advanceMission() {
            if(currentMissionStage < 9 || currentMissionStage === 10) { 
                stopTempCheck(); 
                let targetStage = currentMissionStage + 1; // 기본적으로 다음 스테이지
                
                if (currentMissionStage === 2) {
                    targetStage = 3;
                    if (event1Timer) clearTimeout(event1Timer);
                    event1Timer = setTimeout(() => {
                        if (currentMissionStage === 3) {
                            alert("[EMERGENCY ALERT] 외부 바이러스가 보안 시스템 커널에 침투했습니다.\n긴급 이벤트 1이 시작됩니다.");
                            currentMissionStage = 6;
                            renderMissionContent();
                            updateProgressUI();
                        }
                    }, 5000);
                } else if (currentMissionStage === 3) {
                    targetStage = 4;
                    if (event2Timer) clearTimeout(event2Timer);
                    event2Timer = setTimeout(() => {
                        if (currentMissionStage === 4) {
                            alert("[SYSTEM WARNING] 보안 서버가 부팅 중 커널 패닉 상태에 빠졌습니다.\n긴급 이벤트 2가 시작됩니다.");
                            currentMissionStage = 7;
                            renderMissionContent();
                            updateProgressUI();
                        }
                    }, 5000);
                } else if (currentMissionStage === 4) {
                    alert("[CRITICAL ALERT] 해커가 보안 시스템을 장악하기 위해 공격을 시도합니다.\n이벤트 3이 시작됩니다.");
                    targetStage = 8; // Event 3-1 시작
                } else if (currentMissionStage === 6) { // Event 1 완료
                    alert("시스템 정상화 완료. 본 미션으로 복귀합니다.");
                    targetStage = 3;
                } else if (currentMissionStage === 7) { // Event 2 완료
                    alert("서버 복구 완료. 본 미션으로 복귀합니다.");
                    targetStage = 4;
                } else if (currentMissionStage === 8) { // Event 3-1 완료
                    alert("첫 번째 공격 방어 성공. 두 번째 공격이 이어집니다.");
                    targetStage = 10; // Event 3-2 돌입
                } else if (currentMissionStage === 10) { // Event 3-2 완료
                    alert("해커의 침투 경로 전면 차단됨. 최종 미션으로 돌입합니다.");
                    targetStage = 5;
                } else if (currentMissionStage === 5) {
                    targetStage = 9; // CLEAR
                }
                
                currentMissionStage = targetStage;
                renderMissionContent(); 
                updateProgressUI(); 
            }
        }

        // --- 3. 미션 로직 ---
        function submitAnswer() {
            const val = document.getElementById('answer-input').value.toUpperCase().trim();
            if(val === missionStages[currentMissionStage].answer) advanceMission();
            else alert("정답이 일치하지 않습니다.");
        }

        function adjustTemp(amount) {
            tempValue += amount;
            const tempEl = document.getElementById('current-temp');
            if(tempEl) tempEl.innerText = tempValue.toFixed(1);
        }

        function startTempCheck() {
            tempHoldTime = 0;
            if(tempInterval) clearInterval(tempInterval);
            tempInterval = setInterval(() => {
                if(tempValue >= 25.0 && tempValue <= 25.5) {
                    tempHoldTime += 0.5; // 0.5초마다 체크
                    if(document.getElementById('temp-progress')) {
                        document.getElementById('temp-progress').style.width = `${(tempHoldTime / 3.0) * 100}%`;
                    }
                    if(tempHoldTime >= 3) {
                        clearInterval(tempInterval);
                        alert("서버 온도 정상화 완료!");
                        advanceMission();
                    }
                } else {
                    tempHoldTime = 0;
                    if(document.getElementById('temp-progress')) {
                        document.getElementById('temp-progress').style.width = '0%';
                    }
                }
            }, 500);
        }

        function stopTempCheck() {
            if(tempInterval) clearInterval(tempInterval);
        }

        // 가속도 센서(M1 -> M5) 시뮬레이션 로직
        function handleSensor(e) {
            if (currentMissionStage !== 5) return;
            const pad = document.getElementById('sensor-pad');
            const bubble = document.getElementById('bubble');
            const rect = pad.getBoundingClientRect();
            
            // 중심 기준 마우스 좌표 계산 (-100 ~ 100 범위 모사)
            const x = e.clientX - rect.left - 100; // 200px / 2
            const y = e.clientY - rect.top - 100;
            const dist = Math.sqrt(x*x + y*y);
            const maxRadius = 85; 
            
            let drawX = x, drawY = y;
            if (dist > maxRadius) { drawX = (x / dist) * maxRadius; drawY = (y / dist) * maxRadius; }
            bubble.style.left = `calc(50% + ${drawX}px)`; bubble.style.top = `calc(50% + ${drawY}px)`;

            // 중심 타겟(반경 20px 이내) 판별
            if (dist < 20) { bubble.style.background = "#10b981"; startSensorHold(); } 
            else { bubble.style.background = "#ef4444"; stopSensorHold(); }
        }
        function startSensorHold() {
            if (sensorHoldInterval) return;
            sensorHoldInterval = setInterval(() => {
                currentHoldProgress += 2; // 약 5초 목표 (100ms * 50 = 5000ms)
                document.getElementById('hold-progress').style.width = `${Math.min(currentHoldProgress, 100)}%`;
                
                if (currentHoldProgress >= 100) {
                    stopSensorHold();
                    setTimeout(() => advanceMission(), 300);
                }
            }, 100);
        }
        function stopSensorHold() {
            clearInterval(sensorHoldInterval); sensorHoldInterval = null; currentHoldProgress = 0;
            if(document.getElementById('hold-progress')) document.getElementById('hold-progress').style.width = '0%';
        }
        function resetSensor() {
            const bubble = document.getElementById('bubble');
            if(bubble) { bubble.style.left = '50%'; bubble.style.top = '50%'; bubble.style.background = "#ef4444"; stopSensorHold(); }
        }

        // --- 4. 통신 및 모달 로직 ---
        function openModal(modalId) {
            document.getElementById(modalId).classList.remove('hidden');
            if(modalId === 'notice-modal') {
                noticeBadgeActive = false; // 공지 배지 비활성화
                document.getElementById('notice-badge').classList.add('hidden');
                renderNoticeList();
            } else if(modalId === 'msg-modal') {
                msgBadgeActive = false; // 메시지 배지 비활성화
                document.getElementById('msg-badge').classList.add('hidden');
                renderMessageList();
            }
        }
        function closeModal(modalId) { document.getElementById(modalId).classList.add('hidden'); }

        function renderNoticeList() {
            const container = document.getElementById('notice-list');
            container.innerHTML = globalNotices.map(n => `<div class="bg-gray-800 border-l-4 border-yellow-500 p-3 rounded-lg"><span class="text-gray-500 text-xs mr-2">[${n.time}]</span><span class="text-yellow-100">${n.text}</span></div>`).join('');
            container.scrollTop = container.scrollHeight;
        }

        function renderMessageList() {
            const container = document.getElementById('direct-msg-list');
            if (!nodeMsgs.length) { container.innerHTML = `<div class="text-center text-gray-600 mt-10">GM과 주고받은 메시지가 없습니다.</div>`; return; }
            container.innerHTML = nodeMsgs.map(m => {
                const isGM = m.sender === 'GM';
                return `<div class="flex flex-col ${isGM ? 'items-start' : 'items-end'}"><span class="text-gray-500 text-xs mb-1">${m.sender} - ${m.time}</span><div class="p-3 rounded-lg max-w-[80%] ${isGM ? 'bg-blue-900 text-blue-100' : 'bg-green-900 text-green-100'}">${m.text}</div></div>`
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        function sendNodeMessage() {
            const input = document.getElementById('node-msg-input');
            const text = input.value.trim();
            if(!text) return;
            const time = getTimestamp();
            nodeMsgs.push({ time, sender: 'TEAM 1', text }); // 내 메시지 기록
            renderMessageList();
            input.value = "";
        }

        // --- 5. 타이머 로직 ---
        function updateTimerUI() {
            const m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            const s = (timeRemaining % 60).toString().padStart(2, '0');
            document.getElementById('node-timer').innerText = `${m}:${s}`;
        }
        function startTimer() {
            if (mainTimerInterval) return;
            mainTimerInterval = setInterval(() => {
                if(timeRemaining > 0) { timeRemaining--; updateTimerUI(); }
                else { pauseTimer(); document.getElementById('node-timer').innerText = "TIME OVER"; }
            }, 1000);
        }
        function pauseTimer() { clearInterval(mainTimerInterval); mainTimerInterval = null; }
    </script>
</body>
</html>
