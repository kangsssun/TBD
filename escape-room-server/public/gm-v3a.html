<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[V3-A] 다크네이비 + 네온민트 — GM 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
        :root {
            --bg-main: #0B1120;
            --bg-panel: #111827;
            --bg-panel-light: #1E293B;
            --neon-mint: #00FF9D;
            --neon-mint-dim: #10B981;
            --neon-cyan: #00E5FF;
            --crimson: #FF3366;
            --crimson-dark: #E63946;
            --deep-blue: #0F4C81;
            --warn-yellow: #FFD166;
            --text-white: #FFFFFF;
            --text-muted: #64748B;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Share Tech Mono', monospace; background: var(--bg-main); color: var(--neon-mint); margin: 0; overflow-x: hidden; }
        /* 스캔라인 */
        body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,157,0.015) 2px,rgba(0,255,157,0.015) 4px); pointer-events:none; z-index:9999; }
        /* 그리드 오버레이 */
        .grid-overlay { position:fixed; inset:0; pointer-events:none; z-index:0;
            background-image: linear-gradient(rgba(0,255,157,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(0,255,157,0.03) 1px,transparent 1px);
            background-size: 50px 50px; }

        .header-bar { background:linear-gradient(180deg,#0d1528 0%,var(--bg-main) 100%); border-bottom:2px solid var(--neon-mint); box-shadow:0 2px 20px rgba(0,255,157,0.15); }
        .timer-display { font-family:'Orbitron',sans-serif; font-size:4rem; color:var(--crimson); text-shadow:0 0 20px rgba(255,51,102,0.7),0 0 50px rgba(255,51,102,0.3); letter-spacing:0.1em; }
        .timer-display.warning { animation:timer-blink 1s infinite; }
        @keyframes timer-blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        .status-label { font-family:'Orbitron',sans-serif; font-size:0.65rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--neon-mint-dim); }

        .rec-dot { width:10px; height:10px; border-radius:50%; background:var(--neon-mint); animation:rec-blink 1.5s infinite; box-shadow:0 0 10px var(--neon-mint); }
        @keyframes rec-blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

        .alert-banner { background:rgba(255,51,102,0.06); border:1px solid rgba(255,51,102,0.3); border-left:4px solid var(--crimson); animation:alert-glow 2s infinite; }
        @keyframes alert-glow { 0%,100%{box-shadow:0 0 8px rgba(255,51,102,0.15);} 50%{box-shadow:0 0 20px rgba(255,51,102,0.3);} }

        /* 버튼 — Deep Blue 기본 */
        .btn-action { background:var(--deep-blue); color:var(--neon-mint); border:1px solid var(--neon-mint-dim); padding:8px 16px; border-radius:4px; cursor:pointer; font-family:'Orbitron',sans-serif; font-size:0.7rem; letter-spacing:0.1em; transition:all 0.2s; }
        .btn-action:hover { background:#1a5c9a; box-shadow:0 0 15px rgba(0,255,157,0.2); border-color:var(--neon-mint); }
        /* 버튼 — Crimson 위험 */
        .btn-danger { background:rgba(255,51,102,0.15); color:var(--crimson); border:1px solid var(--crimson); padding:8px 16px; border-radius:4px; cursor:pointer; font-family:'Orbitron',sans-serif; font-size:0.7rem; letter-spacing:0.1em; transition:all 0.2s; }
        .btn-danger:hover { background:rgba(255,51,102,0.3); box-shadow:0 0 15px rgba(255,51,102,0.3); }
        /* 버튼 — 경고/노란 */
        .btn-warn { background:rgba(255,209,102,0.1); color:var(--warn-yellow); border:1px solid rgba(255,209,102,0.4); padding:8px 16px; border-radius:4px; cursor:pointer; font-family:'Orbitron',sans-serif; font-size:0.7rem; letter-spacing:0.1em; transition:all 0.2s; }
        .btn-warn:hover { background:rgba(255,209,102,0.2); }

        .log-panel { background:var(--bg-panel); border:1px solid rgba(0,255,157,0.15); font-size:0.7rem; max-height:300px; overflow-y:auto; }
        .log-panel::-webkit-scrollbar { width:4px; }
        .log-panel::-webkit-scrollbar-thumb { background:var(--neon-mint-dim); border-radius:2px; }
        .log-entry { padding:3px 8px; border-bottom:1px solid rgba(0,255,157,0.05); }

        /* 팀 카드 */
        .team-card-wide {
            background: var(--bg-panel); border: 1px solid rgba(0,255,157,0.15); border-radius: 6px;
            transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
            position: relative; overflow: hidden;
            display: grid; grid-template-columns: 180px 1fr 80px auto; align-items: center; gap: 14px; padding: 16px 20px;
        }
        .team-card-wide::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:linear-gradient(180deg,var(--neon-mint),var(--neon-cyan)); }
        .team-card-wide:hover { border-color:var(--neon-mint); box-shadow:0 0 20px rgba(0,255,157,0.1); }
        .team-card-wide.cleared { border-color:var(--neon-cyan); }
        .team-card-wide.cleared::before { background:var(--neon-cyan); box-shadow:0 0 10px rgba(0,229,255,0.3); }
        .team-card-wide.offline { opacity:0.3; }
        .team-card-wide.offline::before { background:var(--text-muted); }

        .rank-badge { font-family:'Orbitron',sans-serif; font-size:0.6rem; letter-spacing:0.1em; padding:2px 8px; border-radius:3px; display:inline-block; margin-bottom:4px; }

        /* Pill 84px */
        .step-track { display:flex; align-items:center; gap:0; justify-content:center; }
        .mission-step {
            width: 84px; height: 38px; border-radius: 19px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.05rem; font-weight: 900; transition: all 0.3s; flex-shrink: 0;
            font-family: 'Orbitron', sans-serif;
        }
        .step-done { background: var(--neon-mint); color: #000; }
        .step-current { background: var(--crimson); color: #fff; animation: step-pulse 1.5s infinite; box-shadow: 0 0 16px rgba(255,51,102,0.5); }
        .step-pending { background: var(--bg-panel-light); color: var(--text-muted); border: 1px solid #334155; }
        @keyframes step-pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }

        .step-connector { height:3px; width:24px; flex-shrink:0; position:relative; }
        .step-connector.done { background:var(--neon-mint); }
        .step-connector.pending { background:#1E293B; }
        .step-connector .event-alert { position:absolute; top:-16px; left:50%; transform:translateX(-50%); font-size:20px; line-height:1; animation:event-blink 0.8s ease-in-out infinite; filter:drop-shadow(0 0 8px rgba(255,209,102,0.9)); }
        @keyframes event-blink { 0%,100%{opacity:1;transform:translateX(-50%) scale(1);} 50%{opacity:0.15;transform:translateX(-50%) scale(0.85);} }

        .progress-bar-wrapper { display:flex; align-items:center; gap:8px; }
        .progress-bg { flex:1; height:6px; background:var(--bg-panel-light); border-radius:3px; overflow:hidden; }
        .progress-fill { height:100%; border-radius:3px; transition:width 0.5s; }
        .pct-big { font-family:'Orbitron',sans-serif; font-size:1.6rem; font-weight:900; text-align:right; line-height:1; }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <header class="header-bar px-6 py-3 flex items-center justify-between relative z-10">
        <div class="flex items-center gap-4">
            <div class="rec-dot"></div>
            <div>
                <div class="status-label">SECURITY SYSTEM v2.1</div>
                <h1 class="text-xl font-bold text-white" style="font-family:'Orbitron',sans-serif; letter-spacing:0.15em;">GM MASTER CONTROL</h1>
            </div>
        </div>
        <div class="flex items-center gap-8">
            <div class="text-center"><div class="status-label mb-1">NODES</div><div class="text-2xl text-white font-bold" style="font-family:'Orbitron',sans-serif;" id="hdr-nodes">0 / 8</div></div>
            <div class="text-center"><div class="status-label mb-1">AVG</div><div class="text-2xl font-bold" style="font-family:'Orbitron',sans-serif;color:var(--neon-cyan);" id="hdr-avg">0%</div></div>
            <div class="text-center"><div class="status-label mb-1">REMAINING</div><div class="timer-display" id="main-timer">45:00</div></div>
            <div class="flex flex-col gap-2">
                <button class="btn-action" onclick="toggleTimer(true)">▶ START</button>
                <button class="btn-danger" onclick="toggleTimer(false)">⏸ PAUSE</button>
            </div>
        </div>
    </header>
    <div class="alert-banner mx-6 mt-4 p-3 rounded text-center relative z-10">
        <span class="text-sm" style="font-family:'Orbitron',sans-serif; letter-spacing:0.15em; color:var(--warn-yellow);">⚠️ SYSTEM BREACH — 갓찌(🐹) 보안 장애 — 5단계 인증 복구 진행 중 ⚠️</span>
    </div>
    <main class="p-6 relative z-10">
        <div class="grid grid-cols-12 gap-4">
            <div class="col-span-8">
                <div class="flex items-center gap-2 mb-3"><div class="status-label">NODE STATUS MONITORING</div><div class="flex-1 h-px" style="background:rgba(0,255,157,0.15)"></div><div class="text-[10px]" style="color:var(--text-muted)">진행도 높은 순</div></div>
                <div class="flex flex-col gap-3" id="team-list"></div>
                <div class="mt-4 p-4 rounded" style="background:var(--bg-panel); border:1px solid rgba(0,255,157,0.1);" id="ranking-panel"></div>
            </div>
            <div class="col-span-4 flex flex-col gap-4">
                <div><div class="flex items-center gap-2 mb-3"><div class="status-label">COMMUNICATION LOG</div><div class="flex-1 h-px" style="background:rgba(0,255,157,0.15)"></div></div><div class="log-panel rounded p-2" id="log-panel"></div></div>
                <div><div class="flex items-center gap-2 mb-3"><div class="status-label">GM BROADCAST</div><div class="flex-1 h-px" style="background:rgba(0,255,157,0.15)"></div></div>
                    <div class="flex gap-2"><select id="msg-target" class="px-2 py-1 rounded text-xs" style="background:var(--bg-panel);border:1px solid rgba(0,255,157,0.2);color:var(--text-white)"><option value="ALL">ALL</option></select><input type="text" id="msg-input" class="flex-1 px-3 py-1 rounded text-xs focus:outline-none" style="background:var(--bg-panel);border:1px solid rgba(0,255,157,0.2);color:var(--text-white)" placeholder="메시지..."><button class="btn-action text-xs px-3" onclick="sendMsg()">SEND</button></div>
                </div>
                <div><div class="flex items-center gap-2 mb-3"><div class="status-label">QUICK ACTIONS</div><div class="flex-1 h-px" style="background:rgba(0,255,157,0.15)"></div></div>
                    <div class="grid grid-cols-2 gap-2">
                        <button class="btn-action text-xs py-2">🔊 기준음</button>
                        <button class="btn-danger text-xs py-2">⚠️ 전체정지</button>
                        <button class="btn-action text-xs py-2" onclick="triggerEvent()">📢 이벤트</button>
                        <button class="btn-danger text-xs py-2">🏁 퇴실승인</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
    const teams=[{id:1,name:'갓찌토벌대',mission:2,progress:35,status:'active',cleared:false,clearTime:null,event:false},{id:2,name:'해바라기씨수호대',mission:6,progress:100,status:'active',cleared:true,clearTime:'32:15',event:false},{id:3,name:'럭키금성',mission:4,progress:72,status:'active',cleared:false,clearTime:null,event:true},{id:4,name:'LG워리어즈',mission:3,progress:50,status:'active',cleared:false,clearTime:null,event:false},{id:5,name:'대기 중',mission:0,progress:0,status:'offline',cleared:false,clearTime:null,event:false}];
    const logs=[{time:'18:00:00',type:'sys',text:'보안 시스템 v2.1 초기화'},{time:'18:00:01',type:'sys',text:'⚠️ 비콘 장애 — 갓찌🐹'},{time:'18:00:15',type:'node',text:'[T1] 연결됨'},{time:'18:00:18',type:'node',text:'[T2] 연결됨'},{time:'18:00:22',type:'node',text:'[T3] 연결됨'},{time:'18:01:00',type:'gm',text:'[GM→ALL] 게임 시작'},{time:'18:04:35',type:'clear',text:'[T1] ✅ M1 클리어'},{time:'18:06:30',type:'fail',text:'[T1] ❌ M2 실패'},{time:'18:09:13',type:'clear',text:'[T2] ✅ M2 클리어'},{time:'18:10:00',type:'event',text:'[EVENT] ⚡ 바이러스 침투!'},{time:'18:12:00',type:'gm',text:'[GM→T1] 힌트 전송'},{time:'18:15:45',type:'clear',text:'[T3] ✅ M3 클리어'},{time:'18:20:00',type:'event',text:'[T3] ⚡ EVENT 진입'}];
    function renderTeams(){
        const sorted=[...teams].sort((a,b)=>{if(a.cleared&&!b.cleared)return -1;if(!a.cleared&&b.cleared)return 1;return b.progress-a.progress;});
        const active=teams.filter(t=>t.status==='active');
        document.getElementById('hdr-nodes').innerText=`${active.length} / ${teams.length}`;
        document.getElementById('hdr-avg').innerText=`${active.length?Math.round(active.reduce((s,t)=>s+t.progress,0)/active.length):0}%`;
        document.getElementById('team-list').innerHTML=sorted.map((t,idx)=>{
            const off=t.status==='offline',clr=t.cleared;
            const cls=clr?'cleared':(off?'offline':'');
            const mColor=clr?'var(--neon-cyan)':(off?'var(--text-muted)':'var(--crimson)');
            const mText=clr?'ALL CLEAR':(off?'WAITING':`MISSION ${t.mission}`);
            let rank='';
            if(clr) rank=`<div class="rank-badge" style="background:rgba(0,229,255,0.1);color:var(--neon-cyan);border:1px solid rgba(0,229,255,0.3);">🏆 ${t.clearTime}</div>`;
            else if(!off) rank=`<div class="rank-badge" style="background:rgba(0,255,157,0.05);color:var(--text-muted);">#${idx+1}</div>`;
            const steps=buildSteps(t);
            const pColor=clr?'var(--neon-cyan)':'var(--neon-cyan)';
            const right=clr?`<div class="text-center text-[10px] border rounded py-2 px-3 whitespace-nowrap" style="color:var(--neon-cyan);border-color:rgba(0,229,255,0.3)">🏆 ${t.clearTime}</div>`:(off?'<div></div>':`<button class="btn-danger text-[10px] py-2 px-3 whitespace-nowrap">🏁 퇴실</button>`);
            return `<div class="team-card-wide ${cls}"><div><div class="flex items-center gap-2 mb-1"><div class="w-2.5 h-2.5 rounded-full" style="${off?'background:#334155':'background:var(--neon-mint);box-shadow:0 0 6px var(--neon-mint);animation:rec-blink 1.5s infinite'}"></div><span class="${off?'':'text-white'} font-bold text-sm" style="${off?'color:var(--text-muted)':''}">T${t.id} ${t.name}</span></div>${rank}<div class="text-xs mt-1" style="font-family:'Orbitron',sans-serif;color:${mColor};">${mText}</div></div><div><div class="step-track mb-2">${steps}</div><div class="progress-bar-wrapper"><div class="progress-bg"><div class="progress-fill" style="width:${t.progress}%;background:${pColor};box-shadow:0 0 6px rgba(0,229,255,0.3);"></div></div></div></div><div class="pct-big" style="color:${clr?'var(--neon-cyan)':'var(--neon-mint)'}">${t.progress}%</div>${right}</div>`;
        }).join('');
    }
    function buildSteps(team){let html='';for(let i=1;i<=5;i++){let cls='step-pending',lb=i;if(team.cleared||i<team.mission){cls='step-done';lb='✓';}else if(i===team.mission&&!team.cleared&&team.status!=='offline'){cls='step-current';}html+=`<div class="mission-step ${cls}">${lb}</div>`;if(i<5){const cc=(team.cleared||i<team.mission)?'done':'pending';const ev=team.event&&i===team.mission-1?`<span class="event-alert">⚠️</span>`:'';html+=`<div class="step-connector ${cc}">${ev}</div>`;}}return html;}
    function renderLogs(){const p=document.getElementById('log-panel');const cm={sys:'color:var(--warn-yellow)',node:'color:var(--neon-mint)',gm:'color:var(--neon-cyan)',clear:'color:var(--neon-mint)',fail:'color:var(--crimson)',event:'color:var(--warn-yellow)'};p.innerHTML=logs.map(l=>`<div class="log-entry" style="${cm[l.type]||'color:var(--text-white)'}">[${l.time}] ${l.text}</div>`).join('');p.scrollTop=p.scrollHeight;}
    function renderRanking(){const cl=teams.filter(t=>t.cleared).sort((a,b)=>{const f=s=>{const p=s.split(':');return+p[0]*60+ +p[1];};return f(a.clearTime)-f(b.clearTime);});const m=['🥇','🥈','🥉'];let h=`<div class="status-label mb-3">🏆 CLEAR RANKING</div><div class="flex gap-6 text-sm">`;for(let i=0;i<3;i++)h+=cl[i]?`<div class="flex items-center gap-2"><span class="text-lg">${m[i]}</span><span class="text-white">T${cl[i].id} ${cl[i].name}</span><span style="color:var(--text-muted)">${cl[i].clearTime}</span></div>`:`<div class="flex items-center gap-2" style="color:var(--text-muted)"><span class="text-lg">${m[i]}</span><span>---</span></div>`;document.getElementById('ranking-panel').innerHTML=h+'</div>';}
    function updateTargetSelect(){const s=document.getElementById('msg-target');s.innerHTML='<option value="ALL">ALL</option>';teams.filter(t=>t.status==='active').forEach(t=>{s.innerHTML+=`<option value="${t.id}">T${t.id} ${t.name}</option>`;});}
    function sendMsg(){const t=document.getElementById('msg-input').value.trim();if(!t)return;logs.push({time:new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),type:'gm',text:`[GM→${document.getElementById('msg-target').value}] ${t}`});document.getElementById('msg-input').value='';renderLogs();}
    function triggerEvent(){const t=teams.find(t=>t.id===1);t.event=!t.event;logs.push({time:new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),type:'event',text:`[T1] ⚡ EVENT ${t.event?'발동':'해제'}`});renderAll();}
    setInterval(()=>{const a=teams.filter(t=>t.status==='active'&&!t.cleared);if(!a.length)return;const t=a[Math.floor(Math.random()*a.length)];t.progress=Math.min(100,t.progress+Math.floor(Math.random()*5));if(t.progress>=100){t.cleared=true;const e=45*60-timerSeconds;t.clearTime=`${Math.floor(e/60).toString().padStart(2,'0')}:${(e%60).toString().padStart(2,'0')}`;t.event=false;logs.push({time:new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),type:'clear',text:`[T${t.id}] 🎉 ALL CLEAR!`});}if(!t.cleared)t.mission=Math.min(5,Math.floor(t.progress/20)+1);renderAll();},3000);
    let timerSeconds=45*60,timerRunning=false,timerInterval=null;
    function toggleTimer(s){timerRunning=s;if(s&&!timerInterval)timerInterval=setInterval(()=>{if(!timerRunning)return;timerSeconds--;if(timerSeconds<=0){timerSeconds=0;timerRunning=false;}const m=Math.floor(timerSeconds/60).toString().padStart(2,'0');const ss=(timerSeconds%60).toString().padStart(2,'0');document.getElementById('main-timer').innerText=`${m}:${ss}`;if(timerSeconds<5*60)document.getElementById('main-timer').classList.add('warning');},1000);}
    function renderAll(){renderTeams();renderLogs();renderRanking();updateTargetSelect();}
    renderAll();toggleTimer(true);
    </script>
</body>
</html>
