<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[V2-H] 네온 사이버펑크 — GM 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
        * { box-sizing: border-box; }
        body { font-family: 'Share Tech Mono', monospace; background: #05050f; color: #e0e0e0; margin: 0; overflow-x: hidden; }

        /* 네온 그리드 배경 */
        .neon-grid { position:fixed; inset:0; pointer-events:none; z-index:0;
            background-image: linear-gradient(rgba(0,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,0,255,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        /* 하단 수평선 그라디언트 */
        body::before { content:''; position:fixed; bottom:0; left:0; right:0; height:200px; background:linear-gradient(180deg, transparent, rgba(255,0,255,0.05)); pointer-events:none; z-index:0; }

        .header-bar { background:linear-gradient(180deg,#0a0018 0%,#05050f 100%); border-bottom:2px solid #ff00ff; box-shadow:0 2px 30px rgba(255,0,255,0.3); }
        .timer-display { font-family:'Orbitron',sans-serif; font-size:4rem; color:#00ffff; text-shadow:0 0 20px rgba(0,255,255,0.8),0 0 60px rgba(0,255,255,0.3); letter-spacing:0.1em; }
        .timer-display.warning { color:#ff0055; text-shadow:0 0 20px rgba(255,0,85,0.8); animation:timer-blink 1s infinite; }
        @keyframes timer-blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        .status-label { font-family:'Orbitron',sans-serif; font-size:0.65rem; letter-spacing:0.3em; text-transform:uppercase; color:#ff00ff; }
        .rec-dot { width:10px; height:10px; border-radius:50%; background:#ff00ff; animation:rec-blink 1.5s infinite; box-shadow:0 0 10px #ff00ff; }
        @keyframes rec-blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

        .alert-banner { background:rgba(255,0,255,0.05); border:1px solid rgba(255,0,255,0.4); animation:alert-glow 2s infinite; }
        @keyframes alert-glow { 0%,100%{box-shadow:0 0 10px rgba(255,0,255,0.2);} 50%{box-shadow:0 0 30px rgba(255,0,255,0.5);} }

        .btn-cyber { background:transparent; color:#00ffff; border:1px solid #00ffff; padding:8px 16px; border-radius:0; cursor:pointer; font-family:'Orbitron',sans-serif; font-size:0.7rem; letter-spacing:0.1em; transition:all 0.2s; clip-path:polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px)); }
        .btn-cyber:hover { background:rgba(0,255,255,0.15); box-shadow:0 0 20px rgba(0,255,255,0.3); }
        .btn-cyber.danger { color:#ff0055; border-color:#ff0055; }
        .btn-cyber.danger:hover { background:rgba(255,0,85,0.15); box-shadow:0 0 20px rgba(255,0,85,0.3); }
        .btn-cyber.purple { color:#ff00ff; border-color:#ff00ff; }

        .log-panel { background:rgba(10,0,24,0.8); border:1px solid rgba(255,0,255,0.2); font-size:0.7rem; max-height:300px; overflow-y:auto; }
        .log-panel::-webkit-scrollbar { width:4px; }
        .log-panel::-webkit-scrollbar-thumb { background:#ff00ff; border-radius:2px; }
        .log-entry { padding:3px 8px; border-bottom:1px solid rgba(255,0,255,0.05); }

        /* 카드 — 네온 보더 글로우 */
        .team-card-wide {
            background: rgba(10,5,20,0.9); border: 1px solid rgba(255,0,255,0.2); border-radius: 0;
            clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
            transition: all 0.5s; position: relative; overflow: hidden;
            display: grid; grid-template-columns: 170px 1fr 80px auto; align-items: center; gap: 14px; padding: 18px 24px;
        }
        .team-card-wide::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(180deg,#ff00ff,#00ffff); }
        .team-card-wide:hover { border-color:#ff00ff; box-shadow:0 0 25px rgba(255,0,255,0.2), inset 0 0 30px rgba(255,0,255,0.03); }
        .team-card-wide.cleared { border-color:#00ffff; }
        .team-card-wide.cleared::before { background:#00ffff; box-shadow:0 0 15px rgba(0,255,255,0.5); }
        .team-card-wide.offline { opacity:0.3; }
        .team-card-wide.offline::before { background:#333; }
        .rank-badge { font-family:'Orbitron',sans-serif; font-size:0.6rem; letter-spacing:0.1em; padding:2px 8px; display:inline-block; margin-bottom:4px; }

        /* ===== Pill 84px ===== */
        .step-track { display:flex; align-items:center; gap:0; justify-content:center; }
        .mission-step {
            width: 84px; height: 38px; border-radius: 19px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.05rem; font-weight: 900; transition: all 0.3s; flex-shrink: 0;
            font-family: 'Orbitron', sans-serif;
        }
        .step-done { background: #00ffff; color: #000; box-shadow: 0 0 10px rgba(0,255,255,0.4); }
        .step-current { background: #ff00ff; color: #fff; animation: step-pulse 1.5s infinite; box-shadow: 0 0 18px rgba(255,0,255,0.6); }
        .step-pending { background: rgba(255,255,255,0.04); color: #444; border: 1px solid #2a2a2a; }
        @keyframes step-pulse { 0%,100%{transform:scale(1);box-shadow:0 0 18px rgba(255,0,255,0.6);} 50%{transform:scale(1.08);box-shadow:0 0 28px rgba(255,0,255,0.9);} }

        .step-connector { height:3px; width:24px; flex-shrink:0; position:relative; }
        .step-connector.done { background:#00ffff; box-shadow:0 0 6px rgba(0,255,255,0.3); }
        .step-connector.pending { background:#1a1a2a; }
        .step-connector .event-alert { position:absolute; top:-16px; left:50%; transform:translateX(-50%); font-size:20px; line-height:1; animation:event-blink 0.8s ease-in-out infinite; filter:drop-shadow(0 0 8px rgba(255,200,0,0.9)); }
        @keyframes event-blink { 0%,100%{opacity:1;transform:translateX(-50%) scale(1);} 50%{opacity:0.15;transform:translateX(-50%) scale(0.85);} }

        .progress-bar-wrapper { display:flex; align-items:center; gap:8px; }
        .progress-bg { flex:1; height:4px; background:#1a1a2a; border-radius:2px; overflow:hidden; }
        .progress-fill { height:100%; border-radius:2px; transition:width 0.5s; }
        .pct-big { font-family:'Orbitron',sans-serif; font-size:1.6rem; font-weight:900; text-align:right; line-height:1; }

        /* 글리치 타이틀 */
        @keyframes glitch {
            0%,100% { text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff; }
            20% { text-shadow: -3px 0 #ff00ff, 3px 0 #00ffff; }
            40% { text-shadow: 3px 0 #ff00ff, -1px 0 #00ffff; }
            60% { text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff; }
        }
        .glitch-text { animation: glitch 3s infinite; }
    </style>
</head>
<body>
    <div class="neon-grid"></div>
    <header class="header-bar px-6 py-3 flex items-center justify-between relative z-10">
        <div class="flex items-center gap-4">
            <div class="rec-dot"></div>
            <div>
                <div class="status-label">CYBER_BREACH v2.1</div>
                <h1 class="text-xl font-bold text-white glitch-text" style="font-family:'Orbitron',sans-serif; letter-spacing:0.15em;">GM NEON CTRL</h1>
            </div>
        </div>
        <div class="flex items-center gap-8">
            <div class="text-center"><div class="status-label mb-1">NODES</div><div class="text-2xl text-white font-bold" style="font-family:'Orbitron',sans-serif;" id="hdr-nodes">0 / 8</div></div>
            <div class="text-center"><div class="status-label mb-1">AVG</div><div class="text-2xl font-bold" style="font-family:'Orbitron',sans-serif;color:#00ffff;" id="hdr-avg">0%</div></div>
            <div class="text-center"><div class="status-label mb-1">REMAINING</div><div class="timer-display" id="main-timer">45:00</div></div>
            <div class="flex flex-col gap-2">
                <button class="btn-cyber" onclick="toggleTimer(true)">▶ START</button>
                <button class="btn-cyber danger" onclick="toggleTimer(false)">⏸ PAUSE</button>
            </div>
        </div>
    </header>
    <div class="alert-banner mx-6 mt-4 p-3 rounded text-center relative z-10">
        <span class="text-sm" style="font-family:'Orbitron',sans-serif; letter-spacing:0.15em; color:#ff00ff;">⚠️ NEURAL BREACH — 갓찌(🐹) 해킹 감지 — 5단계 방화벽 복구 중 ⚠️</span>
    </div>
    <main class="p-6 relative z-10">
        <div class="grid grid-cols-12 gap-4">
            <div class="col-span-8">
                <div class="flex items-center gap-2 mb-3"><div class="status-label">NODE_MONITOR</div><div class="flex-1 h-px" style="background:rgba(255,0,255,0.2)"></div><div class="text-[10px] text-gray-600">진행도 순</div></div>
                <div class="flex flex-col gap-3" id="team-list"></div>
                <div class="mt-4 p-4" style="background:rgba(10,0,24,0.5); border:1px solid rgba(255,0,255,0.15);" id="ranking-panel"></div>
            </div>
            <div class="col-span-4 flex flex-col gap-4">
                <div><div class="flex items-center gap-2 mb-3"><div class="status-label">COMM_LOG</div><div class="flex-1 h-px" style="background:rgba(255,0,255,0.2)"></div></div><div class="log-panel rounded p-2" id="log-panel"></div></div>
                <div><div class="flex items-center gap-2 mb-3"><div class="status-label">BROADCAST</div><div class="flex-1 h-px" style="background:rgba(255,0,255,0.2)"></div></div>
                    <div class="flex gap-2"><select id="msg-target" class="bg-black border border-purple-900 text-gray-300 px-2 py-1 rounded text-xs"><option value="ALL">ALL</option></select><input type="text" id="msg-input" class="flex-1 bg-black border border-purple-900 text-white px-3 py-1 rounded text-xs focus:outline-none focus:border-pink-500" placeholder="메시지..."><button class="btn-cyber text-xs px-3" onclick="sendMsg()">SEND</button></div>
                </div>
                <div><div class="flex items-center gap-2 mb-3"><div class="status-label">ACTIONS</div><div class="flex-1 h-px" style="background:rgba(255,0,255,0.2)"></div></div>
                    <div class="grid grid-cols-2 gap-2"><button class="btn-cyber text-xs py-2">🔊 기준음</button><button class="btn-cyber danger text-xs py-2">⚠️ 전체정지</button><button class="btn-cyber text-xs py-2" onclick="triggerEvent()">📢 이벤트</button><button class="btn-cyber purple text-xs py-2">🏁 퇴실승인</button></div>
                </div>
            </div>
        </div>
    </main>
    <script>
    const teams=[{id:1,name:'갓찌토벌대',mission:2,progress:35,status:'active',cleared:false,clearTime:null,event:false},{id:2,name:'해바라기씨수호대',mission:6,progress:100,status:'active',cleared:true,clearTime:'32:15',event:false},{id:3,name:'럭키금성',mission:4,progress:72,status:'active',cleared:false,clearTime:null,event:true},{id:4,name:'LG워리어즈',mission:3,progress:50,status:'active',cleared:false,clearTime:null,event:false},{id:5,name:'대기 중',mission:0,progress:0,status:'offline',cleared:false,clearTime:null,event:false}];
    const logs=[{time:'18:00:00',type:'sys',text:'사이버 방벽 초기화'},{time:'18:00:01',type:'sys',text:'⚠️ 갓찌🐹 해킹 감지'},{time:'18:00:15',type:'node',text:'[T1] 노드 접속'},{time:'18:00:18',type:'node',text:'[T2] 노드 접속'},{time:'18:00:22',type:'node',text:'[T3] 노드 접속'},{time:'18:01:00',type:'gm',text:'[GM→ALL] 게임 시작'},{time:'18:04:35',type:'clear',text:'[T1] ✅ M1 돌파'},{time:'18:06:30',type:'fail',text:'[T1] ❌ M2 실패'},{time:'18:09:13',type:'clear',text:'[T2] ✅ M2 돌파'},{time:'18:10:00',type:'event',text:'[EVENT] ⚡ 바이러스!'},{time:'18:12:00',type:'gm',text:'[GM→T1] 힌트'},{time:'18:15:45',type:'clear',text:'[T3] ✅ M3 돌파'},{time:'18:20:00',type:'event',text:'[T3] ⚡ EVENT'}];

    function renderTeams(){
        const sorted=[...teams].sort((a,b)=>{if(a.cleared&&!b.cleared)return -1;if(!a.cleared&&b.cleared)return 1;return b.progress-a.progress;});
        const active=teams.filter(t=>t.status==='active');
        document.getElementById('hdr-nodes').innerText=`${active.length} / ${teams.length}`;
        document.getElementById('hdr-avg').innerText=`${active.length?Math.round(active.reduce((s,t)=>s+t.progress,0)/active.length):0}%`;
        document.getElementById('team-list').innerHTML=sorted.map((t,idx)=>{
            const off=t.status==='offline',clr=t.cleared;
            const cls=clr?'cleared':(off?'offline':'');
            const mColor=clr?'#00ffff':(off?'#444':'#ff00ff');
            const mText=clr?'ALL CLEAR':(off?'WAITING':`MISSION ${t.mission}`);
            let rank='';
            if(clr) rank=`<div class="rank-badge" style="background:rgba(0,255,255,0.1);color:#00ffff;border:1px solid rgba(0,255,255,0.4);">🏆 ${t.clearTime}</div>`;
            else if(!off) rank=`<div class="rank-badge" style="background:rgba(255,0,255,0.05);color:#888;">#${idx+1}</div>`;
            const steps=buildSteps(t);
            const pGrad=clr?'#00ffff':(t.progress>60?'linear-gradient(90deg,#00ffff,#00ff88)':'linear-gradient(90deg,#ff00ff,#ff0088)');
            const right=clr?`<div class="text-center text-[10px] border rounded py-2 px-3 whitespace-nowrap" style="color:#00ffff;border-color:rgba(0,255,255,0.3)">🏆 ${t.clearTime}</div>`:(off?'<div></div>':`<button class="btn-cyber text-[10px] py-2 px-3 whitespace-nowrap">🏁 퇴실</button>`);
            return `<div class="team-card-wide ${cls}"><div><div class="flex items-center gap-2 mb-1"><div class="w-2.5 h-2.5 rounded-full ${off?'bg-gray-700':''}" style="${off?'':'background:#ff00ff;box-shadow:0 0 8px #ff00ff;animation:rec-blink 1.5s infinite;'}"></div><span class="${off?'text-gray-600':'text-white'} font-bold text-sm">T${t.id} ${t.name}</span></div>${rank}<div class="text-xs mt-1" style="font-family:'Orbitron',sans-serif;color:${mColor};">${mText}</div></div><div><div class="step-track mb-2">${steps}</div><div class="progress-bar-wrapper"><div class="progress-bg"><div class="progress-fill" style="width:${t.progress}%;background:${pGrad};box-shadow:0 0 8px ${clr?'rgba(0,255,255,0.4)':'rgba(255,0,255,0.3)'};"></div></div></div></div><div class="pct-big" style="color:${mColor}">${t.progress}%</div>${right}</div>`;
        }).join('');
    }
    function buildSteps(team){let html='';for(let i=1;i<=5;i++){let cls='step-pending',lb=i;if(team.cleared||i<team.mission){cls='step-done';lb='✓';}else if(i===team.mission&&!team.cleared&&team.status!=='offline'){cls='step-current';}html+=`<div class="mission-step ${cls}">${lb}</div>`;if(i<5){const cc=(team.cleared||i<team.mission)?'done':'pending';const ev=team.event&&i===team.mission-1?`<span class="event-alert">⚠️</span>`:'';html+=`<div class="step-connector ${cc}">${ev}</div>`;}}return html;}
    function renderLogs(){const p=document.getElementById('log-panel');const cm={sys:'text-yellow-400',node:'text-green-400',gm:'text-blue-400',clear:'text-cyan-400',fail:'text-red-400',event:'text-pink-400'};p.innerHTML=logs.map(l=>`<div class="log-entry ${cm[l.type]||''}">[${l.time}] ${l.text}</div>`).join('');p.scrollTop=p.scrollHeight;}
    function renderRanking(){const cl=teams.filter(t=>t.cleared).sort((a,b)=>{const f=s=>{const p=s.split(':');return+p[0]*60+ +p[1];};return f(a.clearTime)-f(b.clearTime);});const m=['🥇','🥈','🥉'];let h=`<div class="status-label mb-3">🏆 CLEAR RANKING</div><div class="flex gap-6 text-sm">`;for(let i=0;i<3;i++)h+=cl[i]?`<div class="flex items-center gap-2"><span class="text-lg">${m[i]}</span><span class="text-white">T${cl[i].id} ${cl[i].name}</span><span class="text-gray-500">${cl[i].clearTime}</span></div>`:`<div class="flex items-center gap-2 text-gray-600"><span class="text-lg">${m[i]}</span><span>---</span></div>`;document.getElementById('ranking-panel').innerHTML=h+'</div>';}
    function updateTargetSelect(){const s=document.getElementById('msg-target');s.innerHTML='<option value="ALL">ALL</option>';teams.filter(t=>t.status==='active').forEach(t=>{s.innerHTML+=`<option value="${t.id}">T${t.id} ${t.name}</option>`;});}
    function sendMsg(){const t=document.getElementById('msg-input').value.trim();if(!t)return;logs.push({time:new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),type:'gm',text:`[GM→${document.getElementById('msg-target').value}] ${t}`});document.getElementById('msg-input').value='';renderLogs();}
    function triggerEvent(){const t=teams.find(t=>t.id===1);t.event=!t.event;logs.push({time:new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),type:'event',text:`[T1] ⚡ EVENT ${t.event?'발동':'해제'}`});renderAll();}
    setInterval(()=>{const a=teams.filter(t=>t.status==='active'&&!t.cleared);if(!a.length)return;const t=a[Math.floor(Math.random()*a.length)];t.progress=Math.min(100,t.progress+Math.floor(Math.random()*5));if(t.progress>=100){t.cleared=true;const e=45*60-timerSeconds;t.clearTime=`${Math.floor(e/60).toString().padStart(2,'0')}:${(e%60).toString().padStart(2,'0')}`;t.event=false;logs.push({time:new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),type:'clear',text:`[T${t.id}] 🎉 ALL CLEAR!`});}if(!t.cleared)t.mission=Math.min(5,Math.floor(t.progress/20)+1);renderAll();},3000);
    let timerSeconds=45*60,timerRunning=false,timerInterval=null;
    function toggleTimer(s){timerRunning=s;if(s&&!timerInterval)timerInterval=setInterval(()=>{if(!timerRunning)return;timerSeconds--;if(timerSeconds<=0){timerSeconds=0;timerRunning=false;}const m=Math.floor(timerSeconds/60).toString().padStart(2,'0');const ss=(timerSeconds%60).toString().padStart(2,'0');document.getElementById('main-timer').innerText=`${m}:${ss}`;if(timerSeconds<5*60)document.getElementById('main-timer').classList.add('warning');},1000);}
    function renderAll(){renderTeams();renderLogs();renderRanking();updateTargetSelect();}
    renderAll();toggleTimer(true);
    </script>
</body>
</html>
